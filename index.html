<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>천타버스 그랑프리</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:ital,wght@0,400;0,700;0,900;1,900&family=Rajdhani:wght@600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    
    <style>
        /* EA F1 Base Style */
        :root {
            --theme-mint: #acfef8;
            --ea-dark: #0a0a0f;
            --ea-panel: rgba(20, 20, 25, 0.85);
            --ea-border: rgba(255, 255, 255, 0.15);
            --ea-cyan: #00d2ff;
        }
        body { font-family: 'Noto Sans KR', sans-serif; background-color: var(--ea-dark); color: white; margin: 0; padding: 0; overflow-x: hidden; }
        .ea-font { font-family: 'Rajdhani', 'Noto Sans KR', sans-serif; font-style: italic; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em; }
        .ea-font-black { font-family: 'Noto Sans KR', sans-serif; font-style: italic; font-weight: 900; text-transform: uppercase; letter-spacing: 0.05em; }
        * { border-radius: 0 !important; outline: none !important; }

        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: rgba(0,0,0,0.8); }
        ::-webkit-scrollbar-thumb { background: var(--theme-mint); }

        .menu-bg {
            position: fixed; inset: 0; z-index: -1;
            background: radial-gradient(circle at 70% 30%, rgba(172, 254, 248, 0.15) 0%, var(--ea-dark) 60%);
        }
        .menu-bg::after {
            content: ''; position: absolute; inset: 0;
            background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(255,255,255,0.03) 2px, rgba(255,255,255,0.03) 4px);
            pointer-events: none;
        }

        .ea-panel {
            background: linear-gradient(135deg, rgba(30, 30, 35, 0.95) 0%, rgba(15, 15, 20, 0.95) 100%);
            border: 1px solid var(--ea-border);
            backdrop-filter: blur(10px); box-shadow: 0 20px 40px rgba(0,0,0,0.5); position: relative;
        }
        .ea-panel::before { content: ''; position: absolute; top: 0; left: 0; width: 40px; height: 3px; background: var(--theme-mint); }

        .ea-btn {
            background: rgba(255, 255, 255, 0.05); color: white; border: 1px solid var(--ea-border);
            transform: skewX(-15deg); transition: all 0.2s cubic-bezier(0.25, 0.8, 0.25, 1);
            position: relative; overflow: hidden;
        }
        .ea-btn > span { display: block; transform: skewX(15deg); }
        .ea-btn:hover:not(:disabled) {
            background: white; color: black; border-color: white;
            box-shadow: 0 0 20px rgba(255,255,255,0.3); transform: skewX(-15deg) scale(1.02);
        }
        .ea-btn:disabled { background: rgba(255, 255, 255, 0.02); color: rgba(255,255,255,0.3); cursor: not-allowed; }
        
        .ea-btn-primary { background: var(--theme-mint); border-color: var(--theme-mint); color: var(--ea-dark); }
        .ea-btn-primary:hover:not(:disabled) { background: #8de5dd; border-color: #8de5dd; color: var(--ea-dark); box-shadow: 0 0 30px rgba(172, 254, 248, 0.5); }

        /* Driver Cards - 드래그 지원 스타일 추가 */
        .driver-card {
            background: #111; border: 1px solid var(--ea-border); position: relative; overflow: hidden; cursor: grab;
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1); aspect-ratio: 3/4; user-select: none;
        }
        .driver-card:active { cursor: grabbing; }
        .driver-card img { width: 100%; height: 100%; object-fit: cover; object-position: top; transition: transform 0.5s ease, filter 0.3s ease; filter: grayscale(100%) brightness(0.6); pointer-events: none; }
        .driver-card .card-overlay { position: absolute; inset: 0; background: linear-gradient(0deg, rgba(0,0,0,0.9) 0%, rgba(0,0,0,0.2) 50%, transparent 100%); z-index: 10; pointer-events: none; }
        .driver-card .card-info { position: absolute; bottom: 0; left: 0; width: 100%; padding: 12px; z-index: 20; transform: translateY(5px); transition: transform 0.3s ease; pointer-events: none; }
        .driver-card:hover:not(.selected) img { transform: scale(1.05); filter: grayscale(50%) brightness(0.8); }
        .driver-card:hover:not(.selected) .card-info { transform: translateY(0); }
        .driver-card.selected { border-color: var(--theme-mint); box-shadow: 0 0 20px rgba(172, 254, 248, 0.3); transform: translateY(-5px); }
        .driver-card.selected img { filter: grayscale(0%) brightness(1.1); transform: scale(1.05); }
        .driver-card.selected .card-info { transform: translateY(0); }
        .driver-card.selected::after { content: ''; position: absolute; top: 0; right: 0; width: 30px; height: 30px; background: linear-gradient(225deg, var(--theme-mint) 50%, transparent 50%); z-index: 30; }

        .num-grid { display: grid; grid-template-columns: repeat(6, 1fr); gap: 6px; }
        .num-btn { background: rgba(255,255,255,0.05); border: 1px solid var(--ea-border); color: white; height: 36px; display: flex; align-items: center; justify-content: center; font-size: 1.1rem; cursor: pointer; transition: all 0.2s; }
        .num-btn:hover:not(:disabled) { background: rgba(255,255,255,0.2); }
        .num-btn.selected { background: var(--theme-mint); border-color: var(--theme-mint); color: var(--ea-dark); font-weight: 900; box-shadow: 0 0 15px rgba(172, 254, 248, 0.4); }
        .num-btn:disabled { opacity: 0.2; cursor: not-allowed; }

        #gameScreen { overflow: hidden; }
        #gameCanvas { width: 100%; height: 100%; display: block; cursor: default; }
        
        .telemetry-tower { position: absolute; top: 30px; left: 30px; z-index: 20; width: 290px; } 
        .telemetry-header { background: var(--theme-mint); color: var(--ea-dark); padding: 6px 12px; font-size: 1.1rem; display: flex; justify-content: space-between; clip-path: polygon(0 0, 100% 0, 95% 100%, 0 100%); margin-bottom: 4px; }
        
        /* 위치 기반 스왑 애니메이션 및 그라데이션 배경 적용 (선명도 대폭 상향) */
        .telemetry-row { 
            position: absolute; left: 0; top: 0; width: 100%; height: 32px;
            background: linear-gradient(90deg, var(--row-color, rgba(10,10,15,0.85)) 0%, rgba(10, 10, 15, 0.9) 60%); 
            backdrop-filter: blur(5px); display: flex; align-items: center; border-left: 4px solid transparent; 
            transition: transform 0.4s cubic-bezier(0.25, 0.8, 0.25, 1), opacity 0.3s; 
        }
        .telemetry-row.qualified { 
            border-left-color: var(--theme-mint); 
        }
        .telemetry-row.retired { 
            opacity: 0.5; filter: grayscale(1); 
            background: linear-gradient(90deg, rgba(85, 85, 85, 0.9) 0%, rgba(10, 10, 15, 0.85) 70%);
        }
        
        .tel-rank { width: 25px; text-align: center; font-size: 1.1rem; flex-shrink: 0; text-shadow: -1px -1px 0 #000, 1px -1px 0 #000, -1px 1px 0 #000, 1px 1px 0 #000; }
        .tel-name { flex: 1; margin-right: 4px; font-size: 0.95rem; letter-spacing: 0.5px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; text-shadow: -1px -1px 0 #000, 1px -1px 0 #000, -1px 1px 0 #000, 1px 1px 0 #000, 0 2px 4px rgba(0,0,0,0.8); }
        .tel-time { font-size: 0.75rem; color: #cbd5e1; font-family: monospace; width: 62px; text-align: right; flex-shrink: 0; }
        .tel-interval { font-size: 0.75rem; color: var(--theme-mint); font-weight: 700; font-family: monospace; width: 56px; text-align: right; flex-shrink: 0; padding-right: 4px; }
        .tel-status { width: 34px; font-size: 1.1rem; color: #facc15; padding-right: 8px; margin-left: 2px; text-align: right; flex-shrink: 0; display: flex; justify-content: flex-end; align-items: center; }
        .tel-status.out { font-size: 0.8rem; color: #ef4444; font-weight: bold; }

        /* Minimap */
        #minimapContainer {
            position: absolute; bottom: 30px; right: 30px; width: 220px; height: 220px;
            background: rgba(10, 10, 15, 0.7); border: 2px solid rgba(255,255,255,0.1); border-radius: 50% !important;
            z-index: 20; overflow: hidden; backdrop-filter: blur(4px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        #minimapCanvas { width: 100%; height: 100%; display: block; border-radius: 50% !important; }

        #eventToastContainer { position: absolute; bottom: 80px; left: 50%; transform: translateX(-50%); z-index: 50; display: flex; flex-direction: column; align-items: center; pointer-events: none; }
        .ea-toast { display: flex; background: rgba(0, 0, 0, 0.9); border: 1px solid rgba(255,255,255,0.1); transform: skewX(-15deg); animation: slideUpEA 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; box-shadow: 0 10px 25px rgba(0,0,0,0.8); }
        .ea-toast-inner { display: flex; transform: skewX(15deg); }
        
        #eventToastContainer.size-none { display: none !important; }

        #eventToastContainer.size-small { gap: 8px; }
        #eventToastContainer.size-small .ea-toast-tag { padding: 8px 16px; font-size: 1.2rem; font-weight: 900; color: black; display: flex; align-items: center; }
        #eventToastContainer.size-small .ea-toast-msg { padding: 8px 24px; color: white; font-size: 1.2rem; font-weight: 900; display: flex; align-items: center; }
        
        #eventToastContainer.size-medium { gap: 12px; }
        #eventToastContainer.size-medium .ea-toast-tag { padding: 12px 24px; font-size: 1.6rem; font-weight: 900; color: black; display: flex; align-items: center; }
        #eventToastContainer.size-medium .ea-toast-msg { padding: 12px 32px; color: white; font-size: 1.6rem; font-weight: 900; display: flex; align-items: center; }

        .toast-yellow { border-bottom: 4px solid #facc15; } .toast-yellow .ea-toast-tag { background: #facc15; }
        .toast-red { border-bottom: 4px solid #ef4444; } .toast-red .ea-toast-tag { background: #ef4444; color: white; }
        .toast-green { border-bottom: 4px solid #22c55e; } .toast-green .ea-toast-tag { background: #22c55e; color: white; }
        .toast-mint { border-bottom: 4px solid var(--theme-mint); } .toast-mint .ea-toast-tag { background: var(--theme-mint); color: var(--ea-dark); }
        @keyframes slideUpEA { 0% { opacity: 0; transform: skewX(-15deg) translateY(40px); } 100% { opacity: 1; transform: skewX(-15deg) translateY(0); } }

        #centerAlert { position: absolute; top: 35%; left: 50%; transform: translate(-50%, -50%); z-index: 60; pointer-events: none; }
        .alert-text { font-size: 8rem; color: white; text-shadow: 0px 10px 30px rgba(0,0,0,0.9); margin: 0; line-height: 1; text-align: center; animation: popInEA 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        @keyframes popInEA { 0% { transform: scale(0.8); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }

        #teamRadioContainer { position: absolute; z-index: 80; pointer-events: none; display: flex; flex-direction: column; gap: 12px; transition: top 0.3s, bottom 0.3s, left 0.3s, right 0.3s, transform 0.3s; }
        
        body.radio-pos-right #teamRadioContainer { top: 50%; bottom: auto; right: 40px; left: auto; transform: translateY(-50%); align-items: flex-end; }
        body.radio-pos-bottom #teamRadioContainer { top: auto; bottom: 120px; left: 50%; right: auto; transform: translateX(-50%); align-items: center; }
        body.radio-pos-left #teamRadioContainer { top: auto; bottom: 40px; left: 40px; right: auto; transform: none; align-items: flex-start; }
        body.radio-none #teamRadioContainer { display: none !important; }

        .team-radio-box { background: rgba(15, 15, 20, 0.95); border: 1px solid rgba(255,255,255,0.1); padding: 16px 24px; box-shadow: 0 10px 30px rgba(0,0,0,0.7); opacity: 0; transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); display: flex; flex-direction: column; min-width: 280px; }
        
        /* For Right Position (Default) */
        body.radio-pos-right .team-radio-box { transform: translateX(50px); border-left: 6px solid var(--theme-mint); border-left-color: var(--user-color) !important; }
        body.radio-pos-right .radio-header { justify-content: flex-end; }
        body.radio-pos-right .radio-msg { text-align: right; }

        /* For Bottom Position */
        body.radio-pos-bottom .team-radio-box { transform: translateY(50px); border-bottom: 6px solid var(--theme-mint); border-bottom-color: var(--user-color) !important; border-left: none; }
        body.radio-pos-bottom .radio-header { justify-content: center; }
        body.radio-pos-bottom .radio-msg { text-align: center; }

        /* For Left Position */
        body.radio-pos-left .team-radio-box { transform: translateX(-50px); border-right: 6px solid var(--theme-mint); border-right-color: var(--user-color) !important; border-left: none; }
        body.radio-pos-left .radio-header { justify-content: flex-start; }
        body.radio-pos-left .radio-msg { text-align: left; }

        .team-radio-box.active { opacity: 1; transform: translate(0, 0) !important; }

        .radio-header { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; font-family: 'Rajdhani', sans-serif; font-weight: 900; font-style: italic; font-size: 2.2rem; text-transform: uppercase; line-height: 1; }
        .radio-name { color: #00d2ff; }
        .radio-text { color: #fff; }
        .radio-line { width: 100%; height: 4px; background-color: #00d2ff; margin-bottom: 16px; }
        .radio-msg { color: #fff; font-family: 'Rajdhani', 'Noto Sans KR', sans-serif; font-weight: 900; font-size: 1.8rem; text-align: right; font-style: italic; line-height: 1.2; letter-spacing: 1px; }

        .loading-overlay { position: fixed; inset: 0; background: var(--ea-dark); display: flex; align-items: center; justify-content: center; z-index: 9999; }
        .spinner { width: 60px; height: 60px; border: 4px solid rgba(255,255,255,0.05); border-top-color: var(--theme-mint); animation: spin 1s linear infinite; border-radius: 50% !important; }
        
        #inGameUI { position: absolute; top: 30px; right: 30px; z-index: 140; display: flex; align-items: center; gap: 12px; pointer-events: auto; }
        #inGameUI button { background: rgba(0,0,0,0.6); border: 1px solid var(--theme-mint); color: white; font-size: 1.5rem; cursor: pointer; padding: 8px 16px; transition: 0.2s; position: relative; z-index: 140; pointer-events: auto; }
        #inGameUI button:hover { background: var(--theme-mint); color: black; }

        #ffwdIndicator { position: absolute; top: 100px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.6); padding: 8px 24px; border: 1px solid rgba(255,255,255,0.2); border-radius: 20px !important; z-index: 100; pointer-events: none; backdrop-filter: blur(5px); }
        #ffwdIndicator span.ffwd-icon { color: var(--theme-mint); margin-right: 8px; }

        input[type=range] { -webkit-appearance: none; appearance: none; width: 100%; height: 4px; background: rgba(255,255,255,0.2); outline: none; }
        input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; appearance: none; width: 16px; height: 16px; background: var(--theme-mint); cursor: pointer; border-radius: 50% !important; }

        #resultScreen { position: absolute; top: 0; left: 0; width: 100%; min-height: 100vh; background: rgba(10,10,15,0.98); z-index: 50; overflow-y: auto; padding: 3rem 1rem; }

        @keyframes flashIndicator { 
            0% { opacity: 0.3; filter: brightness(0.8); box-shadow: 0 0 5px currentColor; } 
            100% { opacity: 1; filter: brightness(1.5); box-shadow: 0 0 15px currentColor, 0 0 30px currentColor; } 
        }
        .indicator-light { display: inline-block; width: 14px; height: 14px; background-color: currentColor; animation: flashIndicator 0.4s ease-in-out infinite alternate; transform: skewX(-15deg); margin-bottom: 2px; border-radius: 2px; }
    </style>
</head>
<body class="radio-pos-left">

    <!-- Loading -->
    <div id="loadingOverlay" class="loading-overlay">
        <div class="text-center">
            <div class="spinner mx-auto mb-8"></div>
            <p class="text-white text-3xl ea-font tracking-widest text-gray-400">리소스 로딩 중 <span id="loadProgress" class="text-white ml-2">0/12</span></p>
        </div>
    </div>

    <!-- Intro Video Player -->
    <div id="videoOverlay" class="hidden fixed inset-0 bg-black z-[300]">
        <video id="introVideo" class="w-full h-full object-contain" src="R1.mkv"></video>
        
        <div class="absolute top-6 right-6 z-10 flex items-center gap-4 bg-[rgba(10,10,15,0.8)] border border-[rgba(255,255,255,0.2)] px-3 py-2 shadow-lg backdrop-blur-md">
            <div class="flex items-center gap-3">
                <div class="flex flex-col items-center justify-center text-white ea-font text-[11px] leading-tight">
                    <span class="text-base mb-1">🔊</span>
                    <span>영상</span>
                    <span>볼륨</span>
                </div>
                <div class="flex flex-col items-center gap-2 mt-1">
                    <span id="vidVolText" class="text-[#acfef8] text-xs font-bold w-10 text-center inline-block flex-shrink-0">50%</span>
                    <input type="range" id="vidVolSlider" min="0" max="100" value="50" class="w-24 cursor-pointer" oninput="updateVideoVolume()">
                </div>
            </div>

            <div class="w-px h-10 bg-[rgba(255,255,255,0.2)] mx-1"></div>
            
            <button class="ea-btn ea-btn-primary px-4 py-1 flex-shrink-0" onclick="skipIntroVideo()">
                <span class="flex flex-col items-center justify-center text-[12px] font-bold">
                    <span class="text-base leading-none mb-1 mt-0.5">▶▶</span>
                    <span>스킵</span>
                </span>
            </button>
        </div>
    </div>

    <!-- Main Menu -->
    <div id="menuScreen" class="min-h-screen flex flex-col relative opacity-0 transition-opacity duration-500 hidden">
        <div class="menu-bg"></div>
        <header class="w-full pt-8 pb-4 px-12 flex justify-between items-end border-b border-[rgba(255,255,255,0.1)]">
            <div class="flex items-center gap-6">
                <img src="logo2.png" alt="R1 Logo" class="h-12 object-contain filter brightness-0 invert opacity-80">
                <h1 class="text-4xl text-white ea-font-black m-0 leading-none">천타버스 <span class="text-[#acfef8]">그랑프리™</span></h1>
            </div>
            <div class="hidden lg:flex gap-8 text-gray-400 ea-font text-xl">
                <!-- 변경됨: 탭 스위칭 기능 추가 -->
                <span id="navChunta" class="text-[#acfef8] border-b-2 border-[#acfef8] pb-1 cursor-pointer transition-colors" onclick="switchRoster('chunta')">천타버스</span>
                <span id="navOther" class="hover:text-white cursor-pointer transition-colors" onclick="switchRoster('other')">기타 컨텐츠</span>
                <span class="hover:text-white cursor-pointer transition-colors" onclick="openSettings()">환경설정</span>
            </div>
        </header>

        <div class="flex-1 w-full max-w-[1600px] mx-auto p-8 flex flex-col lg:flex-row gap-8">
            <div class="w-full lg:w-1/3 flex flex-col gap-6">
                <div class="ea-panel p-6">
                    
                    <!-- NEW: Tabs for Session Mode -->
                    <div class="flex mb-6 border-b border-[rgba(255,255,255,0.1)]">
                        <button id="tabSurvival" class="flex-1 py-4 ea-font-black text-2xl text-[#acfef8] bg-gradient-to-r from-[rgba(172,254,248,0.2)] to-transparent text-center transition-all duration-300" onclick="setMode('survival')">멤버 뽑기</button>
                        <button id="tabTeam" class="flex-1 py-4 ea-font-black text-2xl text-gray-500 hover:text-white text-center transition-all duration-300" onclick="setMode('team')">팀 나누기</button>
                    </div>
                    
                    <!-- Survival (Default) Setting -->
                    <div id="survivalSettingSection" class="mb-6">
                        <div class="flex justify-between items-center mb-3">
                            <span class="ea-font text-lg text-white">합격 인원 설정</span>
                            <span id="qualifyText" class="ea-font-black text-xl text-[#acfef8]">-</span>
                        </div>
                        <div id="passCountWrapper" class="num-grid"></div>
                    </div>

                    <!-- Team Mode Setting -->
                    <div id="teamSettingSection" class="mb-6 hidden">
                        <div class="flex justify-between items-center mb-1">
                            <span class="ea-font text-lg text-white">팀 수 설정</span>
                            <span id="teamCountText" class="ea-font-black text-xl text-[#acfef8]">-</span>
                        </div>
                        <div class="text-[#acfef8] text-sm mb-3 ea-font font-bold">※ 스네이크 방식으로 배정됩니다.</div>
                        <div class="flex gap-2">
                            <button class="ea-btn flex-1 py-2 team-btn" data-teams="2"><span>2팀</span></button>
                            <button class="ea-btn flex-1 py-2 team-btn" data-teams="3"><span>3팀</span></button>
                            <button class="ea-btn flex-1 py-2 team-btn" data-teams="4"><span>4팀</span></button>
                        </div>
                    </div>

                    <!-- Laps Setting -->
                    <div class="mb-6">
                        <div class="flex justify-between items-center mb-3">
                            <span class="ea-font text-lg text-white">랩 수 설정 (LAPS)</span>
                            <span id="lapSettingText" class="ea-font-black text-xl text-[#acfef8]">1 LAP</span>
                        </div>
                        <div class="flex gap-2">
                            <button class="ea-btn flex-1 py-2 lap-btn ea-btn-primary" data-laps="1"><span>1</span></button>
                            <button class="ea-btn flex-1 py-2 lap-btn" data-laps="2"><span>2</span></button>
                            <button class="ea-btn flex-1 py-2 lap-btn" data-laps="3"><span>3</span></button>
                            <button class="ea-btn flex-1 py-2 lap-btn" data-laps="5"><span>5</span></button>
                        </div>
                    </div>

                    <!-- Participant Selection -->
                    <div class="mb-8 pt-4 border-t border-[rgba(255,255,255,0.1)]">
                        <div class="flex justify-between items-center mb-3">
                            <span class="ea-font text-lg text-white">참가자 일괄 선택</span>
                        </div>
                        <!-- Chuntaverse Buttons -->
                        <div class="flex gap-2" id="selectionButtonsChunta">
                            <button id="selectAllBtn" class="ea-btn flex-1 py-3 ea-font text-sm"><span>전체 선택</span></button>
                            <button id="selectPassedBtn" class="ea-btn flex-1 py-3 ea-font text-sm hidden"><span>이전 합격자</span></button>

    <script>
        const baseUrl = 'https://raw.githubusercontent.com/Cren0p/CRD/refs/heads/main/';
        
        let membersChuntaverse = [
            { id: 1, name: '천양', imgWebp: baseUrl + '01.webp', imgJpg: baseUrl + '01.jpg', color: '#43EAF6' },
            { id: 2, name: '마다옴', imgWebp: baseUrl + '02.webp', imgJpg: baseUrl + '02.jpg', color: '#FFF5C3' },
            { id: 3, name: '나나문', imgWebp: baseUrl + '03.webp', imgJpg: baseUrl + '03.jpg', color: '#F4F6FF' },
            { id: 4, name: '임하밍', imgWebp: baseUrl + '04.webp', imgJpg: baseUrl + '04.jpg', color: '#F8DBFF' },
            { id: 5, name: '문모모', imgWebp: baseUrl + '05.webp', imgJpg: baseUrl + '05.jpg', color: '#A868FB' },
            { id: 6, name: '한아밍', imgWebp: baseUrl + '06.webp', imgJpg: baseUrl + '06.jpg', color: '#FEC0C2' },
            { id: 7, name: '카푸', imgWebp: baseUrl + '07.webp', imgJpg: baseUrl + '07.jpg', color: '#FFCFB7' },
            { id: 8, name: '캬앙', imgWebp: baseUrl + '08.webp', imgJpg: baseUrl + '08.jpg', color: '#FF5A4D' },
            { id: 9, name: '김웰로', imgWebp: baseUrl + '09.webp', imgJpg: baseUrl + '09.jpg', color: '#BFEF90' },
            { id: 10, name: '모카', imgWebp: baseUrl + '10.webp', imgJpg: baseUrl + '10.jpg', color: '#5E8EFF' },
            { id: 11, name: '달타', imgWebp: baseUrl + '11.webp', imgJpg: baseUrl + '11.jpg', color: '#FFC462' },
            { id: 12, name: '파니', imgWebp: baseUrl + '12.webp', imgJpg: baseUrl + '12.jpg', color: '#9FC5E8' }
        ];

        // ============================================================================
        // ▼ 기타 컨텐츠 전체 멤버 데이터베이스 (이곳에 새로운 멤버를 미리 다 등록해두세요) ▼
        const ALL_OTHER_MEMBERS = [
            { id: 101, name: '난워니', imgWebp: 'guest/nanwony.png', imgJpg: 'guest/nanwony.png', color: '#ffff00' },
            { id: 102, name: '뢴트게늄', imgWebp: 'guest/roen.webp', imgJpg: 'guest/roen.webp', color: '#e5446e' },
            { id: 103, name: '카나시', imgWebp: 'guest/kanasi.png', imgJpg: 'guest/kanasi.png', color: '#ffd4c2' },
            { id: 104, name: '최또', imgWebp: 'guest/choiddo.png', imgJpg: 'guest/choiddo.png', color: '#f1c1c3' },
            { id: 105, name: '나리', imgWebp: 'guest/nari.png', imgJpg: 'guest/nari.png', color: '#1c1c1c' },
            { id: 106, name: '돗챠', imgWebp: 'guest/dotcha.png', imgJpg: 'guest/dotcha.png', color: '#f788be' }
            
        ];

        // ▼ 실제 레이스에 표시할 기타 멤버 선택 ▼
        // 1. '멤버 뽑기' 대기열에 기본으로 들어갈 멤버
        const ACTIVE_SURVIVAL_MEMBERS = [
            '돗챠',
            '카푸'
        ];

        // 2. '팀 나누기' 대기열에 미리 넘어가 있을 멤버
        const ACTIVE_TEAM_MEMBERS = [
            '천양',
            '마다옴',
            '캬앙',
            '달타',
            '난워니', 
            '뢴트게늄',
            '김웰로', 
            '파니',
            '카나시',
            '최또',
            '나리'
            
        ];

        // 선택된 이름/ID를 바탕으로 실제 사용할 기타 멤버 리스트 생성
        let membersOther = [];
        
        ACTIVE_SURVIVAL_MEMBERS.forEach(input => {
            let found = ALL_OTHER_MEMBERS.find(m => m.id === input || m.name === input) || 
                        membersChuntaverse.find(m => m.id === input || m.name === input);
            if (found) membersOther.push({ ...found, pool: 'survival' });
        });

        ACTIVE_TEAM_MEMBERS.forEach(input => {
            let found = ALL_OTHER_MEMBERS.find(m => m.id === input || m.name === input) || 
                        membersChuntaverse.find(m => m.id === input || m.name === input);
            if (found) membersOther.push({ ...found, pool: 'team' });
        });
        // ============================================================================

        // 멤버 정렬 로직 (천양 1순위, 나머지 가나다순)
        function sortMembers(arr) {
            arr.sort((a, b) => {
                if (a.id === 1) return -1;
                if (b.id === 1) return 1;
                return a.name.localeCompare(b.name);
            });
        }
        sortMembers(membersChuntaverse);
        sortMembers(membersOther);

        let currentRosterMode = 'chunta';
        let members = membersChuntaverse;

        let selectedMembers = new Set();
        let passCount = null;
        let selectedLaps = 1;
        let isTeamMode = false;
        let teamCount = null;
        const teamColors = ['#ef4444', '#3b82f6', '#22c55e', '#facc15']; // Red, Blue, Green, Yellow
        const teamNames = ['A팀', 'B팀', 'C팀', 'D팀'];

        let lastRacePassedIds = new Set();
        let lastRaceFailedIds = new Set();
        let allImagesLoaded = false;
        const preloadedTextures = {};

        // Audio System
        let bgm = null;
        let engineAudio = null;
        let gridAudioObj = null; // 그리드 소개 오디오
        let isMuted = false;
        let masterVolume = 1.0; 
        let bgmVolume = 0.6; // 60% 기본값
        let sfxVolume = 0.5; 
        let engineVolume = 0.5; 
        let subtitlePos = 'left';

        let audioCtx = null;

        let scene, camera, renderer;
        let maxAnisotropy = 1; 
        let trackCurve = null;
        let trackLength = 0;
        let runners = [];
        let trackWidth = 45; 
        
        let gameRunning = false;
        let gamePaused = false; 
        let raceStarted = false;
        let raceEnded = false;
        let isTransitioningToResult = false;
        let startingSequence = false;
        let lastTime = 0;
        let gameTime = 0;
        let raceTimer = 0;
        
        let isFastForwarding = false;
        let cameraMode = 'overview';
        let cameraTimer = 0;
        let zoomFactor = 1.0;

        let lapPunctureTriggerPos = []; 
        let lapPunctureTriggered = [];
        let lastLapEventTriggered = false; 
        let vscActive = false;
        let vscTimer = 0;
        let isPhotoFinish = false;
        let photoFinishTimer = 0;
        
        let maxEventTriggered = false;

        let introIdx = 0;
        let introTimer = 0;
        let lightState = 0;

        window._camTargetPos = new THREE.Vector3();
        window._camLookAtPos = new THREE.Vector3();
        window._smoothLeaderPos = 0; 
        window._prevPackLeader = null; 
        window._currentFocusTarget = null; 
        window._actualTimeScale = 1.0;
        window._forceCameraCut = false;
        window._currentCamPos = null;
        window._currentLookAt = null;

        let eventFocusTimer = 0;
        let activeEventTargets = [];

        let mmCtx = null;
        let trackBounds = { minX: 0, maxX: 0, minZ: 0, maxZ: 0, scale: 1, cx: 0, cz: 0 };
        const mmSize = 220;

        const ui = {
            menu: document.getElementById('menuScreen'),
            game: document.getElementById('gameScreen'),
            result: document.getElementById('resultScreen'),
            startBtn: document.getElementById('startBtn'),
            startSpan: document.querySelector('#startBtn span'),
            passWrapper: document.getElementById('passCountWrapper'),
            grid: document.getElementById('memberGrid'),
            lbContainer: document.getElementById('leaderboard'),
            lbList: document.getElementById('rankingList'),
            lapInfo: document.getElementById('lapInfo'),
            centerAlert: document.getElementById('centerAlert'),
            centerText: document.getElementById('centerAlertText'),
            toastContainer: document.getElementById('eventToastContainer'),
            qualifyText: document.getElementById('qualifyText'),
            lapSettingText: document.getElementById('lapSettingText'),
            minimapCanvas: document.getElementById('minimapCanvas'),
            ffwdIndicator: document.getElementById('ffwdIndicator'),
            settingsModal: document.getElementById('settingsModal'),
            speedLines: document.getElementById('speedLines'),
            teamRadioContainer: document.getElementById('teamRadioContainer'),
            gridIntroOverlay: document.getElementById('gridIntroOverlay'),
            skipIntroBtn: document.getElementById('skipIntroBtnContainer')
        };

        function init() {
            renderPassButtons();
            setupLapButtons();
            setupTeamButtons();
            
            const tempCanvas = document.createElement('canvas');
            const tempRenderer = new THREE.WebGLRenderer({canvas: tempCanvas});
            maxAnisotropy = tempRenderer.capabilities.getMaxAnisotropy();
            tempRenderer.dispose();

            preloadImages();

            // Chuntaverse Button Events
            document.getElementById('selectAllBtn').onclick = () => {
                if (selectedMembers.size === members.length) selectedMembers.clear();
                else members.forEach(m => selectedMembers.add(m.id));
                updateSelectionUI();
            };
            document.getElementById('selectPassedBtn').onclick = () => applyPrev(lastRacePassedIds);
            document.getElementById('selectFailedBtn').onclick = () => applyPrev(lastRaceFailedIds);
            
            // Other Content Button Events
            document.getElementById('selectAllOtherBtn').onclick = () => {
                if (selectedMembers.size === members.length) selectedMembers.clear();
                else members.forEach(m => selectedMembers.add(m.id));
                updateSelectionUI();
            };
            document.getElementById('selectSurvivalPoolBtn').onclick = () => {
                const targetIds = members.filter(m => m.pool === 'survival').map(m => m.id);
                const allSelected = targetIds.every(id => selectedMembers.has(id)) && targetIds.length > 0;
                targetIds.forEach(id => allSelected ? selectedMembers.delete(id) : selectedMembers.add(id));
                updateSelectionUI();
            };
            document.getElementById('selectTeamPoolBtn').onclick = () => {
                const targetIds = members.filter(m => m.pool === 'team').map(m => m.id);
                const allSelected = targetIds.every(id => selectedMembers.has(id)) && targetIds.length > 0;
                targetIds.forEach(id => allSelected ? selectedMembers.delete(id) : selectedMembers.add(id));
                updateSelectionUI();
            };

            ui.startBtn.onclick = startRaceTransition;
            
            document.getElementById('captureBtn').onclick = captureResultsText;
            document.getElementById('replayBtn').onclick = returnToMenu;

            window.addEventListener('wheel', (e) => {
                if (gameRunning && raceStarted && !gamePaused) {
                    zoomFactor += e.deltaY * 0.001;
                    zoomFactor = Math.max(0.4, Math.min(3.0, zoomFactor));
                }
            });
        }

        // --- Roster Switching Logic ---
        function switchRoster(mode) {
            if (currentRosterMode === mode) return;
            currentRosterMode = mode;
            
            const navChunta = document.getElementById('navChunta');
            const navOther = document.getElementById('navOther');
            
            if (mode === 'chunta') {
                navChunta.className = "text-[#acfef8] border-b-2 border-[#acfef8] pb-1 cursor-pointer transition-colors";
                navOther.className = "hover:text-white cursor-pointer transition-colors text-gray-400";
                members = membersChuntaverse;
                document.getElementById('selectionButtonsChunta').classList.remove('hidden');
                document.getElementById('selectionButtonsOther').classList.add('hidden');
            } else {
                navOther.className = "text-[#acfef8] border-b-2 border-[#acfef8] pb-1 cursor-pointer transition-colors";
                navChunta.className = "hover:text-white cursor-pointer transition-colors text-gray-400";
                members = membersOther;
                document.getElementById('selectionButtonsChunta').classList.add('hidden');
                document.getElementById('selectionButtonsOther').classList.remove('hidden');
            }
            
            selectedMembers.clear();
            passCount = null;
            lastRacePassedIds.clear();
            lastRaceFailedIds.clear();
            
            // Chuntaverse 모드일 경우에만 합격자/탈락자 버튼 업데이트
            updatePassedFailedButtons();
            
            preloadImages(); // UI 및 Grid 갱신
        }

            if (currentRosterMode === 'chunta') {

        // --- Utils & Formatting ---
        function formatTime(sec) {
            if (isNaN(sec) || !sec) return "--:--.---";
            const m = Math.floor(sec / 60);
            const s = Math.floor(sec % 60);
            const ms = Math.floor((sec % 1) * 1000);
            return `${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}.${ms.toString().padStart(3, '0')}`;
        }

        function preloadImages() {
            let loaded = 0;

            if(members.length === 0) {
                onAllLoaded();
                return;
            }

            document.getElementById('loadingOverlay').style.display = 'flex';
            document.getElementById('loadProgress').textContent = `0/${members.length}`;

            members.forEach(m => {
                if (preloadedTextures[m.id]) {
                    loaded++;
                    document.getElementById('loadProgress').textContent = `${loaded}/${members.length}`;
                    if (loaded === members.length) onAllLoaded();
                } else {
                    const fallbackImg = 'logo2.png';
                    let targetImg = m.imgJpg || fallbackImg;
                    const isExternal = targetImg.startsWith('http');
                    const tempLoader = new THREE.TextureLoader();
                    if (isExternal) tempLoader.setCrossOrigin('anonymous');
                    
                    tempLoader.load(targetImg, (tex) => {
                        tex.magFilter = THREE.LinearFilter; 
                        tex.minFilter = THREE.LinearMipmapLinearFilter; 
                        tex.anisotropy = maxAnisotropy; 
                        preloadedTextures[m.id] = tex;
                        loaded++; document.getElementById('loadProgress').textContent = `${loaded}/${members.length}`;
                        if (loaded === members.length) onAllLoaded();
                    }, undefined, () => {
                        // 이미지 로드 실패 시 logo2.png 대체 시도
                        const fbLoader = new THREE.TextureLoader();
                        fbLoader.load(fallbackImg, (fbTex) => {
                            fbTex.magFilter = THREE.LinearFilter; 
                            fbTex.minFilter = THREE.LinearMipmapLinearFilter; 
                            fbTex.anisotropy = maxAnisotropy; 
                            preloadedTextures[m.id] = fbTex;
                            loaded++; document.getElementById('loadProgress').textContent = `${loaded}/${members.length}`;
                            if (loaded === members.length) onAllLoaded();
                        }, undefined, () => {
                            // 대체 이미지마저 실패했을 경우 진행을 위해 강제 패스
                            loaded++; document.getElementById('loadProgress').textContent = `${loaded}/${members.length}`;
                            if (loaded === members.length) onAllLoaded();
                        });
                    });
                }
            });
            
            function onAllLoaded() {

        // --- Drag and Drop API 연동 ---
        window.allowDrop = (e) => {
            e.preventDefault();
            e.currentTarget.classList.add('border-[var(--theme-mint)]', 'bg-[rgba(172,254,248,0.05)]');
        };
        window.dragLeave = (e) => {
            e.currentTarget.classList.remove('border-[var(--theme-mint)]', 'bg-[rgba(172,254,248,0.05)]');
        };
        window.dropToPool = (e, pool) => {
            e.preventDefault();
            e.currentTarget.classList.remove('border-[var(--theme-mint)]', 'bg-[rgba(172,254,248,0.05)]');
            const id = e.dataTransfer.getData('text/plain');
            if(!id) return;
            const member = members.find(m => m.id.toString() === id);
            if (member && member.pool !== pool) {
                member.pool = pool;
                createMemberGrid();
                updateSelectionUI();
            }
        };

        function createCard(m) {
            const card = document.createElement('div');
            card.className = 'driver-card cursor-grab active:cursor-grabbing';
            card.dataset.id = m.id;
            
            // Drag and Drop 설정
            card.draggable = true;
            card.ondragstart = (e) => {
                e.dataTransfer.setData('text/plain', m.id);
                e.target.style.opacity = '0.5';
            };
            card.ondragend = (e) => {
                e.target.style.opacity = '1';
            };
            
            const imgUrl = m.imgWebp || 'logo2.png';
            const coAttr = imgUrl.startsWith('http') ? 'crossorigin="anonymous"' : '';
            
            card.innerHTML = `
                <div class="absolute inset-0" style="background: radial-gradient(circle at center 30%, ${m.color}80 0%, #111 70%); z-index: 1;"></div>
                <img src="${imgUrl}" ${coAttr} alt="${m.name}" style="position: relative; z-index: 5; pointer-events: none;" onerror="this.onerror=null; this.src='logo2.png';">
                <div class="card-overlay" style="z-index: 10;"></div>
                <div class="card-info" style="z-index: 20;">
                    <div class="w-6 h-1 mb-1" style="background-color: ${m.color}"></div>
                    <div class="ea-font-black text-xl leading-none text-white tracking-wide truncate">${m.name}</div>
                </div>
            `;
            card.onclick = () => {
                if (selectedMembers.has(m.id)) selectedMembers.delete(m.id);
                else selectedMembers.add(m.id);
                updateSelectionUI();
            };
            return card;
        }

        // --- Sound System ---
        function initAudio() {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            if (audioCtx.state === 'suspended') audioCtx.resume();
        }

        function playSound(type) {
            if (isMuted || !audioCtx) return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            
            const now = audioCtx.currentTime;
            const targetVol = sfxVolume * masterVolume * 0.375; 
            
            if (type === 'crash') {
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(80, now);
                osc.frequency.exponentialRampToValueAtTime(10, now + 0.4);
                gain.gain.setValueAtTime(sfxVolume * masterVolume * 1.5, now);
                gain.gain.exponentialRampToValueAtTime(0.01, now + 0.4);
                osc.start(now); osc.stop(now + 0.4);
            } else if (type === 'beep') {
                osc.type = 'square';
                osc.frequency.setValueAtTime(440, now);
                gain.gain.setValueAtTime(targetVol * 0.4, now);
                gain.gain.setValueAtTime(0, now + 0.2);
                osc.start(now); osc.stop(now + 0.2);
            } else if (type === 'beep_high') {
                osc.type = 'square';
                osc.frequency.setValueAtTime(880, now);
                gain.gain.setValueAtTime(targetVol * 0.5, now);
                gain.gain.setValueAtTime(0, now + 0.6);
                osc.start(now); osc.stop(now + 0.6);
            }
        }

        function playBoxRadio(member, reasonMsg = "", isBox = true) {
            if (document.body.classList.contains('radio-none')) return;
            
            if (!isMuted && isBox) {
                const radio = new Audio('box.mp3');
                radio.volume = Math.min(1.0, sfxVolume * masterVolume * 1.25); 
                radio.play().catch(()=>{});
            }
            
            const container = ui.teamRadioContainer;
            const box = document.createElement('div');
            box.className = 'team-radio-box';
            box.style.setProperty('--user-color', member.color);

            const msgHtml = isBox ? `"BOX, BOX"<br><span style="font-size: 0.65em; color: #fff;">${reasonMsg}</span>` : `"${reasonMsg}"`;
            
            box.innerHTML = `
                <div class="radio-header">
                    <span class="radio-name" style="color: ${member.color}">${member.name}</span>
                    <span class="radio-icon" style="font-size: 1.5rem; margin: 0 4px; font-style: normal;">📻</span>
                    <span class="radio-text">RADIO</span>
                </div>
                <div class="radio-line" style="width: 100%; height: 4px; background-color: ${member.color}; margin-bottom: 16px;"></div>
                <div class="radio-msg">${msgHtml}</div>
            `;
            
            container.appendChild(box);

            void box.offsetWidth; 
            box.classList.add('active');
            
            setTimeout(() => {
                box.classList.remove('active');
                setTimeout(() => box.remove(), 400); 
            }, 4000);
        }

        function startEngineSound() {
            if (isMuted || raceEnded || isTransitioningToResult) return;
            if (!engineAudio) {
                engineAudio = new Audio('engine.mp3');
                engineAudio.loop = true;
            }
            engineAudio.volume = engineVolume * masterVolume * 0.35; 
            engineAudio.playbackRate = 1.0;
            engineAudio.play().catch(e => console.log('Engine audio play failed:', e));
        }

        function updateEngineSound(leaderSpeed) {
            if (isMuted || raceEnded || gamePaused || isTransitioningToResult) { 
                if(engineAudio && !engineAudio.paused) engineAudio.pause();
                return; 
            }
            if (!engineAudio || engineAudio.paused) startEngineSound();
            
            if (engineAudio) {
                let rate = 0.5 + (leaderSpeed || 0) * 0.005;
                rate = Math.max(0.3, Math.min(2.5, rate));
                try { engineAudio.playbackRate = rate; } catch(e){}
                engineAudio.volume = engineVolume * masterVolume * 0.35; 
            }
        }

        function stopEngineSound() {
            if (engineAudio) {
                const fadeInterval = setInterval(() => {
                    if (engineAudio.volume > 0.05) engineAudio.volume = Math.max(0, engineAudio.volume - 0.05);
                    else { 
                        engineAudio.pause(); 
                        clearInterval(fadeInterval); 
                    }
                }, 50);
            }
        }

        function playBGM() {
            if(bgm) { bgm.pause(); bgm.src=''; }
            bgm = new Audio('chuntaverse.mp3');
            // BGM 기본 볼륨을 조금 더 잘 들리도록 0.6 초기 세팅 적용
            bgm.volume = isMuted ? 0 : bgmVolume * masterVolume;
            bgm.loop = true; 
            bgm.playbackRate = isFastForwarding ? 1.5 : 1.0;
            bgm.play().catch(() => { document.addEventListener('click', () => bgm.play().catch(()=>{}), {once: true}); });

        function createFloorGeometry(curve, segments, leftOffset, rightOffset) {
            const points = curve.getSpacedPoints(segments);
            const vertices = []; const uvs = []; const indices = [];
            for (let i = 0; i <= segments; i++) {
                const p = points[i];
                let t = (i < segments) ? points[i+1].clone().sub(p).normalize() : points[0].clone().sub(points[segments-1]).normalize();
                const n = new THREE.Vector3(-t.z, 0, t.x).normalize();
                
                const v1 = p.clone().add(n.clone().multiplyScalar(leftOffset));
                const v2 = p.clone().add(n.clone().multiplyScalar(rightOffset));
                
                vertices.push(v1.x, v1.y, v1.z);
                vertices.push(v2.x, v2.y, v2.z);
                
                const u = i / segments;
                uvs.push(0, u); uvs.push(1, u); 
            }
            for (let i = 0; i < segments; i++) {
                const base = i * 2; const next = (i + 1) * 2;
                indices.push(base, next, base+1);
                indices.push(next, next+1, base+1);
            }
            const geo = new THREE.BufferGeometry();
            geo.setAttribute('position', new THREE.Float32BufferAttribute(vertices, 3));
            geo.setAttribute('uv', new THREE.Float32BufferAttribute(uvs, 2));
            geo.setIndex(indices);
            geo.computeVertexNormals();
            return geo;
        }

        function createAdWall(curve, offset, height, texture) {
            const segments = 3000;
            const points = curve.getSpacedPoints(segments);
            const vertices = []; const uvsFront = []; const uvsBack = []; const indicesFront = []; const indicesBack = [];
            for (let i = 0; i <= segments; i++) {
                const p = points[i];
                let t = (i < segments) ? points[i+1].clone().sub(p).normalize() : points[0].clone().sub(points[segments-1]).normalize();
                const n = new THREE.Vector3(-t.z, 0, t.x).normalize();
                
                const baseP = p.clone().add(n.clone().multiplyScalar(offset));
                const topP = baseP.clone().add(new THREE.Vector3(0, height, 0));
                
                vertices.push(baseP.x, baseP.y, baseP.z);
                vertices.push(topP.x, topP.y, topP.z);
                
                const u = i / segments;
                uvsFront.push(u, 0); uvsFront.push(u, 1);
                uvsBack.push(1-u, 0); uvsBack.push(1-u, 1);
            }
            for (let i = 0; i < segments; i++) {
                const base = i * 2; const next = (i + 1) * 2;
                indicesFront.push(base, next, base+1); indicesFront.push(next, next+1, base+1);
                indicesBack.push(base, base+1, next); indicesBack.push(next, base+1, next+1);
            }
            
            const geoFront = new THREE.BufferGeometry();
            geoFront.setAttribute('position', new THREE.Float32BufferAttribute(vertices, 3));
            geoFront.setAttribute('uv', new THREE.Float32BufferAttribute(uvsFront, 2));
            geoFront.setIndex(indicesFront); geoFront.computeVertexNormals();
            
            const geoBack = new THREE.BufferGeometry();
            geoBack.setAttribute('position', new THREE.Float32BufferAttribute(vertices, 3));
            geoBack.setAttribute('uv', new THREE.Float32BufferAttribute(uvsBack, 2));
            geoBack.setIndex(indicesBack); geoBack.computeVertexNormals();

            const mat = new THREE.MeshStandardMaterial({ map: texture, roughness: 1.0, metalness: 0.0, side: THREE.FrontSide, color: 0xdddddd });
            const group = new THREE.Group();
            group.add(new THREE.Mesh(geoFront, mat)); group.add(new THREE.Mesh(geoBack, mat));
            return group;
        }

        function createAdTexture(callback) {
            const canvas = document.createElement('canvas');
            const h = 512; 
            const ctx = canvas.getContext('2d');
            const adUrls = [
                'https://stimg.sooplive.com/NORMAL_BBS/3/12240993/438669efbbb96ffbe.png',
                'https://stimg.sooplive.com/NORMAL_BBS/3/12240993/400469ea5c8310b52.png',
                'https://stimg.sooplive.co.kr/NORMAL_BBS/9/17851689/1684693598158ec2c.png'
                
            ];

            let loadedImgs = [];
            let loadedCount = 0;

            const finalize = () => {
                if(loadedImgs.length === 0) {
                    canvas.width = 512; canvas.height = h;
                    ctx.fillStyle = '#111'; ctx.fillRect(0,0,512,h);
                    const tex = new THREE.CanvasTexture(canvas);
                    tex.userData = { aspect: 512/h };
                    callback(tex);
                    return;
                }

                let totalW = 0;
                const spacerW = h * 1.5; 
                loadedImgs.forEach(img => { totalW += h * (img.width / img.height) + spacerW; });

                canvas.width = totalW;
                canvas.height = h;
                let x = 0;
                
                loadedImgs.forEach(img => {
                    const w = h * (img.width / img.height);
                    ctx.drawImage(img, x, 0, w, h);
                    x += w;
                    
                    ctx.fillStyle = '#111';
                    ctx.fillRect(x, 0, spacerW, h);
                    
                    ctx.fillStyle = '#222';
                    ctx.fillRect(x + 20, 20, spacerW - 40, h - 40);
                    
                    ctx.fillStyle = '#fff';
                    ctx.font = "italic 900 60px 'Noto Sans KR', sans-serif";
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'middle';
                    ctx.fillText("CHUNTAVERSE", x + spacerW/2, h/2 - 35);
                    ctx.fillText("GRAND PRIX", x + spacerW/2, h/2 + 35);
                    
                    x += spacerW;
                });

                const tex = new THREE.CanvasTexture(canvas);
                tex.wrapS = THREE.RepeatWrapping; tex.wrapT = THREE.RepeatWrapping;
                tex.anisotropy = maxAnisotropy;
                tex.userData = { aspect: totalW / h }; 
                callback(tex);
            };

            adUrls.forEach(url => {
                const img = new Image(); img.crossOrigin = 'anonymous';
                img.onload = () => { loadedImgs.push(img); loadedCount++; if(loadedCount===adUrls.length) finalize(); };
                img.onerror = () => { loadedCount++; if(loadedCount===adUrls.length) finalize(); };
                img.src = url;
            });
        }

            const wallHeight = 8.0;

            const ground = new THREE.Mesh(new THREE.PlaneGeometry(15000, 15000), new THREE.MeshStandardMaterial({ color: 0x1d5c38, roughness: 1 }));

        function buildDrivers() {

            const spread = 0.05 / selectedLaps; 

            // F1 Style Zig-Zag Starting Grid

                const gridPosition = idx + 1; // 1, 2, 3...
