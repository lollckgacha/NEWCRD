        function activateMidBossEffect() {
            document.getElementById('midbossSplitOverlay').classList.remove('active');
            document.getElementById('midbossCharacterDisplay').classList.remove('active');
            if (midBossMesh) { scene.remove(midBossMesh); midBossMesh = null; }
            if (bgm) bgm.volume = isMuted ? 0 : currentVolume;

            const elRun = runners.filter(r => !r.member.isBoss && !r.finished);
            if (elRun.length === 0) { isPaused = false; midBossActive = false; return; }

            if (currentMidBoss.id === 'authority') {
                let n = elRun.length === 1 ? 1 : (Math.random() < 0.5 ? 3 : (Math.random() < 0.8 ? 2 : 1)); n = Math.min(n, elRun.length);
                const tr = [...elRun].sort(()=>Math.random()-0.5).slice(0, n); let idx=0;
                function nxt() {
                    if (idx >= tr.length) { isPaused = false; midBossActive = false; return; }
                    const r = tr[idx];
                    document.getElementById('midbossAlert').querySelector('div').innerHTML = `<span style="color:${r.member.color}">${r.member.name}</span> <span style="color:${r.member.color}">천타버스 나가 줄 수 있어?</span>`;
                    document.getElementById('midbossAlert').classList.remove('hidden');
                    const cPos = new THREE.Vector3(r.laneX+4, 5, r.position+8); const cLook = new THREE.Vector3(r.laneX, 2, r.position);
                    const sPos = camera.position.clone(); const sLook = camera.lookAtVector.clone(); const sT = performance.now();
                    function animC() {
                        const p = Math.min((performance.now()-sT)/500, 1);
                        camera.position.lerpVectors(sPos, cPos, p); camera.lookAtVector.lerpVectors(sLook, cLook, p); camera.lookAt(camera.lookAtVector);
                        renderer.render(scene, camera);
                        if(p<1) requestAnimationFrame(animC);
                        else {
                            r.isPushedBack = true; r.pushBackStartPos = r.position; r.pushBackTarget = Math.max(0, r.position - (15+Math.random()*10));
                            const pT = performance.now();
                            function animP() {
                                const pp = Math.min((performance.now()-pT)/1000, 1); const eased = 1-Math.pow(1-pp,3);
                                r.position = r.pushBackStartPos + (r.pushBackTarget - r.pushBackStartPos) * eased; r.mesh.position.z = r.position;
                                r.mesh.rotation.z = Math.sin(pp*Math.PI*4)*0.3*(1-pp);
                                camera.lookAtVector.set(r.laneX, 2, r.position); camera.lookAt(camera.lookAtVector); camera.position.z = r.position+8;
                                renderer.render(scene, camera);
                                if(pp<1) requestAnimationFrame(animP);
                                else { r.isPushedBack = false; r.mesh.rotation.z = 0; setTimeout(()=>{ document.getElementById('midbossAlert').classList.add('hidden'); idx++; setTimeout(nxt, 500); }, 500); }
                            }
                            animP();
                        }
                    }
                    animC();
                }
                nxt();
            } else if (currentMidBoss.id === 'buo') {
                const tr = [...elRun].sort(()=>Math.random()-0.5).slice(0, Math.max(1, Math.ceil(elRun.length/2)));
                document.getElementById('midbossAlert').querySelector('div').innerHTML = tr.map(r=>`<span style="color:${r.member.color}">${r.member.name}</span>`).join('&nbsp;') + ` <span style="color:#ddd">보호막 획득!</span>`;
                document.getElementById('midbossAlert').classList.remove('hidden');
                let done=0;
                tr.forEach(r => {
                    r.hasShield=true; r.shieldCharges=3; r.shieldMeshes=[]; r.shieldProcessedObs=new Set();
                    for(let i=0; i<3; i++) {
                        const m = new THREE.Mesh(new THREE.SphereGeometry(2+i*0.4, 16, 16), new THREE.MeshBasicMaterial({color:0xffa500, transparent:true, opacity:0.25-i*0.05, side:THREE.DoubleSide, depthWrite:false}));
                        m.position.y=1.5; m.scale.set(0,0,0); r.mesh.add(m); r.shieldMeshes.push(m);
                        const s=performance.now();
                        function aS() { const p=Math.min((performance.now()-s)/400,1); const scl=p<1?p*1.1:1; m.scale.setScalar(scl); renderer.render(scene,camera); if(p<1) requestAnimationFrame(aS); }
                        aS();
                    }
                    setTimeout(()=>{ done++; if(done===tr.length) { document.getElementById('midbossAlert').classList.add('hidden'); isPaused=false; midBossActive=false; } }, 1000);
                });
            } else {
                const imR = elRun[Math.floor(Math.random()*elRun.length)]; const tr = elRun.filter(r=>r!==imR);
                document.getElementById('lightningFlash').classList.remove('hidden'); setTimeout(()=>document.getElementById('lightningFlash').classList.add('hidden'), 100);
                document.getElementById('midbossAlert').querySelector('div').innerHTML = `<span style="color:${imR.member.color}">${imR.member.name}</span> <span style="color:#ddd">제외 전원 감전!</span>`;
                document.getElementById('midbossAlert').classList.remove('hidden');
                tr.forEach(r => {
                    r.isElectrocuted=true; r.electrocuteTimer=2.0;
                    const grp=new THREE.Group(); grp.position.set(r.laneX, 0, r.position);
                    const pts=[]; for(let i=0; i<=10; i++) pts.push(new THREE.Vector3((Math.random()-0.5)*1.2, 25-(22*i/10), (Math.random()-0.5)*1.2));
                    grp.add(new THREE.Mesh(new THREE.TubeGeometry(new THREE.CatmullRomCurve3(pts), 20, 0.12, 6, false), new THREE.MeshBasicMaterial({color:0xff0000})));
                    scene.add(grp); setTimeout(()=>scene.remove(grp), 300);
                });
                setTimeout(()=> { document.getElementById('midbossAlert').classList.add('hidden'); isPaused=false; midBossActive=false; }, 2000);
            }
        }

        // Sprint Event (crd)
        function triggerSprintPhase() {
            if (sprintPhaseStarted || ultimateUsed || !sprintEnabled) return;
            const ar = runners.filter(r => !r.finished).sort((a,b)=>b.position-a.position); if(ar.length===0) return;
            
            let failRunners;
            if (isTeamMode) {
                const half = Math.floor(ar.length / 2);
                failRunners = ar.slice(half);
            } else {
                failRunners = passCount ? ar.slice(passCount) : ar.slice(Math.floor(ar.length/2));
            }
            if (failRunners.length === 0) failRunners = ar; 

            sprintPhaseStarted = true; ultimateUsed = true; ultimateActive = true; isPaused = true;
            let w=[]; failRunners.forEach((r,i) => w.push({r, w:Math.pow(i+1,2)}));
            let rV = Math.random() * w.reduce((s,i)=>s+i.w, 0); let sR = w[0].r;
            for(let j=0; j<w.length; j++) { rV-=w[j].w; if(rV<=0) { sR=w[j].r; break; } }
            sprintRunners=[sR];

            document.getElementById('sprintSplitOverlay').classList.add('active');
            document.getElementById('sprintCharacterDisplay').innerHTML = `<img class="sprint-character-image" src="${sR.member.imgPng||sR.member.img}"><div class="sprint-character-text" style="color:${sR.member.color}">${sR.member.name} 막판 스퍼트!</div>`;
            document.getElementById('sprintCharacterDisplay').classList.add('active');
            if(bgm) bgm.volume *= 0.3;

            setTimeout(() => {
                isPaused = false; document.getElementById('sprintSplitOverlay').classList.remove('active'); document.getElementById('sprintCharacterDisplay').classList.remove('active');
                document.getElementById('sprintSpeedLines').classList.remove('hidden'); document.getElementById('sprintWindEffect').classList.remove('hidden');
                
                const wC = document.getElementById('sprintWindEffect'); wC.innerHTML='';
                for(let i=0; i<12; i++) {
                    const l=document.createElement('div'); l.className='wind-line';
                    l.style.top=`${Math.random()*100}%`; l.style.width=`${20+Math.random()*40}px`; l.style.animationDelay=`${Math.random()*2}s`; l.style.animationDuration=`${0.2+Math.random()*0.3}s`;
                    wC.appendChild(l);
                }

                if(bgm) bgm.volume = isMuted?0:currentVolume;
                sprintRunners.forEach(r => {
                    r.isSprinting=true; r.ultimateActive=true;
                    let cutR = isTeamMode ? ar[0] : ar[Math.max(0, passCount-1)] || ar[0];
                    let bF = 1.0 + Math.max(0, cutR.position - r.position) / Math.max(1, trackLength - cutR.position);
                    r.sprintSpeed = r.baseSpeed * bF;
                    
                    const eG = new THREE.Group();
                    const rM = new THREE.Mesh(sharedGeometries.boostRing, new THREE.MeshBasicMaterial({color:r.member.color, transparent:true, opacity:0.4, side:THREE.DoubleSide, depthWrite:false}));
                    rM.rotation.x=-Math.PI/2; rM.userData={scale:1, op:0.4}; eG.add(rM); r.mesh.add(eG);
                    r.sprintEffects = { effectGroup: eG, ring: rM, time: 0 };
                });
                
                const uA = document.getElementById('ultimateAlert');
                uA.querySelector('div').textContent = `${sR.member.name} 막판 스퍼트!`; uA.querySelector('div').style.color = sR.member.color;
                uA.classList.remove('hidden'); setTimeout(()=>uA.classList.add('hidden'), 3000);
            }, 1500);
        }

        function animateLoop(time) {
            time = time || performance.now();
            if (!gameRunning) return;
            const delta = Math.min((time - lastTime) / 1000, 0.1); lastTime = time;
            checkMidBossEvent();
            if(!isPaused) {
                updateRunners(delta); updateCamera(delta); updateRankingPanel(); updateNameSubtitles();
                obstacles.forEach(o => { if(o.type==='gravel') o.mesh.rotation.z = Math.sin(gameTime*2)*0.05; });
                if(window._dirLight && runners.length>0) {
                    const lZ = runners.reduce((m,r)=>Math.max(m, r.position), 0);
                    window._dirLight.position.set(50, 100, lZ+50); window._dirLight.target.position.set(0,0,lZ); window._dirLight.target.updateMatrixWorld();
                }
                checkGameEnd();
            }
            renderer.render(scene, camera); requestAnimationFrame(animateLoop);
        }

        function updateRunners(delta) {
            if (!raceStarted || raceEnded) return;
            const effD = delta * slowMotionFactor; gameTime += effD;

            runners.forEach(r => {
                if(r.hasShield) {
                    if(r.shieldCharges<=0) { r.hasShield=false; r.shieldMeshes.forEach(m=>{r.mesh.remove(m);}); r.shieldMeshes=[]; }
                    else r.shieldMeshes.forEach((m,i)=>{ m.visible=(r.shieldMeshes.length-1-i)<r.shieldCharges; if(m.visible) { m.rotation.y+=effD*2; m.material.opacity=0.25-i*0.05+Math.sin(gameTime*5)*0.05; } });
                }
                if(r.isElectrocuted) {
                    r.electrocuteTimer-=effD; if(r.electrocuteTimer<=0) r.isElectrocuted=false;
                }
            });

            const ar = runners.filter(r=>!r.finished);
            if(ar.length > 0) {
                const ld = ar.reduce((a,b)=>a.position>b.position?a:b);
                if(ld.position/trackLength > 0.75 && !sprintPhaseStarted && sprintEnabled) triggerSprintPhase();
            }

            runners.forEach(r => {
                r.nameMesh.position.z = r.position - 8;
                if(r.isJumping) {
                    r.jumpPhase+=effD*15; if(r.jumpPhase<Math.PI) r.mesh.position.y=Math.sin(r.jumpPhase)*2.5; else { r.isJumping=false; r.mesh.position.y=0; }
                }
                if(r.isFailJumping) {
                    r.failJumpPhase+=effD*6; r.mesh.rotation.x=Math.sin(r.failJumpPhase)*0.6; if(r.failJumpPhase>=Math.PI) { r.isFailJumping=false; r.mesh.rotation.x=0; }
                }
                if(!r.finished) {
                    obstacles.forEach(o => {
                        const d = o.zPos - r.position;
                        if(o.lane===r.lane && Math.abs(d)<2.5 && !r.shieldProcessedObs.has(o.obsId)) {
                            if(o.type==='hurdle' && !r.isJumping && !r.hurdleFailing && r.slowdownTimer<=0 && d>0 && d<2) {
                                if(r.hasShield && r.shieldCharges>0) { r.shieldProcessedObs.add(o.obsId); r.shieldCharges--; }
                                else {
                                    r.isJumping=true; r.jumpPhase=0; if(Math.random()>Math.min(1, 0.4+r.hurdleFailCount*0.15)) { r.isJumping=false; r.isFailJumping=true; r.failJumpPhase=0; r.hurdleFailTimer=0.5; r.speed=0; r.hurdleFailing=true; r.hurdleFailCount++; } else r.hurdleFailCount=0;
                                }
                            } else if(o.type==='gravel' && !r.isJumping && Math.abs(d)<2 && r.slowdownTimer<=0) {
                                if(r.hasShield && r.shieldCharges>0) { r.shieldProcessedObs.add(o.obsId); r.shieldCharges--; }
                                else { r.slowdownTimer=1.0; r.speed=(r.isSprinting?r.sprintSpeed:r.baseSpeed)*0.5; r.tiltPhase=0; }
                            } else if(o.type==='boost' && !r.isJumping && Math.abs(d)<1.5 && r.speedBoostTimer<=0) {
                                r.speedBoostTimer=1.0; r.speed=(r.isSprinting?r.sprintSpeed:r.baseSpeed)*1.5;
                            }
                        }
                    });
                }
                
                if(r.hurdleFailTimer>0) { r.hurdleFailTimer-=effD; if(r.hurdleFailTimer<=0) { r.hurdleFailing=false; r.speed=r.isSprinting?r.sprintSpeed:r.baseSpeed; r.mesh.rotation.x=0; } }
                if(r.slowdownTimer>0) { r.slowdownTimer-=effD; if(r.slowdownTimer<=0) r.speed=r.isSprinting?r.sprintSpeed:r.baseSpeed; }
                if(r.speedBoostTimer>0) { r.speedBoostTimer-=effD; if(r.speedBoostTimer<=0) r.speed=r.isSprinting?r.sprintSpeed:r.baseSpeed; }

                let cS = r.speed;
                if(r.isSprinting && r.slowdownTimer<=0 && r.speedBoostTimer<=0 && !r.hurdleFailing) cS=r.sprintSpeed;
                if(r.isElectrocuted) cS=r.baseSpeed*0.3;
                
                if(!r.isJumping && !r.isPushedBack) r.position += cS*effD; else if(!r.isPushedBack) r.position += cS*effD*0.8;
                r.mesh.position.z = r.position;

                if(!r.finished && r.position >= trackLength) {
                    r.finished = true; r.finishTime = gameTime; r.isSprinting = false; r.ultimateActive = false;
                    if(r.sprintEffects) { r.mesh.remove(r.sprintEffects.effectGroup); r.sprintEffects=null; }
                    finishedRunners.push(r);
                }

                const aS = r.ultimateActive ? 35 : (r.isJumping ? 30 : 22); r.animPhase += effD*aS;
                r.leftArm.rotation.x = Math.sin(r.animPhase)*0.8; r.rightArm.rotation.x = -Math.sin(r.animPhase)*0.8;
                r.leftLeg.rotation.x = -Math.sin(r.animPhase)*0.3; r.rightLeg.rotation.x = Math.sin(r.animPhase)*0.3;
                if(!r.isJumping) r.mesh.position.y = Math.abs(Math.sin(r.animPhase*2))*0.15;
                if(r.slowdownTimer>0 && r.hurdleFailTimer<=0) { r.tiltPhase+=effD*60; r.mesh.rotation.z = Math.sin(r.tiltPhase*0.2)*0.5; } else if(!r.isPushedBack) r.mesh.rotation.z=0;
                
                if(r.isSprinting && r.sprintEffects) {
                    const e = r.sprintEffects; e.ring.userData.scale+=effD*4; e.ring.userData.op-=effD*0.8;
                    if(e.ring.userData.op<=0) { e.ring.userData.scale=1; e.ring.userData.op=0.5; }
                    e.ring.scale.setScalar(e.ring.userData.scale); e.ring.material.opacity = Math.max(0, e.ring.userData.op);
                }
            });
        }

        // 결승선을 통과하면 카메라를 고정하도록 수정 및 원본 카메라 시점 전환 복구
        function updateCamera(delta) {
            cameraChangeTimer -= delta * slowMotionFactor;
            
            const sr = [...runners].sort((a,b)=>b.position-a.position); const ld = sr[0];
            const tP = new THREE.Vector3(); const lP = new THREE.Vector3();
            
            let minZ = Math.min(...sr.map(r => r.position));
            let maxZ = Math.max(...sr.map(r => r.position));
            let centerZ = (maxZ + minZ) / 2;

            // 카메라 타겟 Z값을 트랙의 끝인 결승선까지만 제한합니다.
            let camTargetLeaderZ = Math.min(ld.position, trackLength);
            let camTargetCenterZ = Math.min(centerZ, trackLength);
            
            if (gapMode && gapRunnerA && gapRunnerB) {
                const midX = (gapRunnerA.laneX + gapRunnerB.laneX)/2; 
                const midZ = (gapRunnerA.position + gapRunnerB.position)/2;
                tP.set(midX+30, 15, midZ); lP.set(midX, 2, midZ);
                camera.position.lerp(tP, 0.1);
                camera.lookAtVector.lerp(lP, 0.1);
            } else {
                // 시점 자동 전환 로직 복구
                if (cameraChangeTimer <= 0) {
                    cameraChangeTimer = 4 + Math.random() * 4;
                    prevCameraMode = currentCameraMode;
                    const rand = Math.random();
                    if (sprintPhaseStarted && rand < 0.8) currentCameraMode = 'side';
                    else if (rand < 0.3) currentCameraMode = 'overview';
                    else if (rand < 0.5) currentCameraMode = 'front';
                    else if (rand < 0.7) currentCameraMode = 'side';
                    else currentCameraMode = 'follow';
                }

                const ease = 0.08;
                if (currentCameraMode === 'overview') { 
                    tP.set(25, 40, camTargetLeaderZ - 25); 
                    lP.set(5, 0, camTargetLeaderZ); 
                } else if (currentCameraMode === 'front') {
                    tP.set(ld.laneX, 5, camTargetLeaderZ + 30);
                    lP.set(ld.laneX, 2, camTargetLeaderZ);
                } else if (currentCameraMode === 'side') {
                    tP.set(selectedMembers.size * 3 + 20, 10, camTargetCenterZ - 5);
                    lP.set(0, 2, camTargetCenterZ + 10);
                } else { // follow
                    tP.set(ld.laneX - 10, 8, camTargetLeaderZ - 20);
                    lP.set(ld.laneX, 2, camTargetLeaderZ + 10);
                }
                
                camera.position.lerp(tP, ease);
                camera.lookAtVector.lerp(lP, ease);
            }
            camera.lookAt(camera.lookAtVector);
        }

        function updateRankingPanel() {
            const sr = [...runners].sort((a,b) => {
                if(a.finished && b.finished) return a.finishTime - b.finishTime;
                if(a.finished) return -1; if(b.finished) return 1;
                return b.position - a.position;
            });
            
            let teamAssignments = [];
            if (isTeamMode) {
                let total = sr.length;
                let sizes = new Array(teamCount).fill(Math.floor(total / teamCount));
                for (let i = 0; i < total % teamCount; i++) sizes[i]++;
                let left = 0; let right = total - 1; let placeLeft = true;
                for (let t = 0; t < teamCount; t++) {
                    while (sizes[t] > 0) {
                        if (placeLeft) teamAssignments[left++] = t;
                        else teamAssignments[right--] = t;
                        placeLeft = !placeLeft;
                        sizes[t]--;
                    }
                }
            }

            const rL = document.getElementById('rankingList'); rL.innerHTML='';
            sr.forEach((r, i) => {
                const rank = i+1; 
                const d = document.createElement('div');
                let baseClasses = 'ranking-item flex items-center gap-1 p-1 text-sm ';
                
                if (isTeamMode) {
                    const tIdx = teamAssignments[i];
                    const hex = teamColors[tIdx];
                    const red = parseInt(hex.slice(1, 3), 16);
                    const green = parseInt(hex.slice(3, 5), 16);
                    const blue = parseInt(hex.slice(5, 7), 16);
                    // 팀 색상을 rgba로 변환하여 연한 배경색 및 테두리 설정
                    d.className = baseClasses;
                    d.style.backgroundColor = `rgba(${red}, ${green}, ${blue}, 0.25)`;
                    d.style.border = `1px solid rgba(${red}, ${green}, ${blue}, 0.3)`;
                } else {
                    const isQ = rank<=passCount;
                    if(r.finished && isQ) confirmedRanks.add(r.member.id);
                    const confCls = confirmedRanks.has(r.member.id) ? 'ranking-item-confirmed' : '';
                    d.className = baseClasses + (isQ ? 'bg-green-900/40 ' : 'bg-[rgba(255,255,255,0.05)] ') + confCls;
                }

                d.innerHTML = `<span class="w-6 text-center font-bold text-sm" style="color:${r.member.color}">${rank}</span><img src="${r.member.imgPng||r.member.img}" crossorigin="anonymous" class="w-6 h-6 rounded-full object-cover"><span class="text-xs font-bold truncate" style="color:${r.member.color}">${r.member.name}</span><span style="width:0.5em;"></span>`;
                rL.appendChild(d);
            });
        }

        function updateNameSubtitles() {
            const sr = [...runners].sort((a,b) => b.position - a.position);
            sr.forEach((r, i) => {
                const rank = i+1; if(previousRanks[r.member.id]===rank) return;
                previousRanks[r.member.id] = rank;
                const cvs = document.createElement('canvas'); cvs.width=1440; cvs.height=360; const ctx=cvs.getContext('2d');
                ctx.lineWidth=16; ctx.font="900 240px 'Segoe UI', sans-serif"; ctx.textAlign='center'; ctx.textBaseline='middle';
                ctx.strokeStyle='rgba(0,0,0,0.8)'; ctx.strokeText(rank.toString(), 400, 180); ctx.fillStyle=r.member.color; ctx.fillText(rank.toString(), 400, 180);
                ctx.lineWidth=12; ctx.font="900 180px 'Segoe UI', sans-serif";
                ctx.strokeText(r.member.name, 900, 180); ctx.fillStyle=r.member.color; ctx.fillText(r.member.name, 900, 180);
                if(r.nameMesh.material.map) r.nameMesh.material.map.dispose();
                r.nameMesh.material.map = new THREE.CanvasTexture(cvs); r.nameMesh.material.needsUpdate=true;
            });
        }

        function checkGameEnd() {
            if (gameEndScheduled) return;
            if (!isTeamMode && passCount && finishedRunners.length >= passCount) {
                gameEndScheduled=true; raceEnded=true; stopBGM(); showFinalGap();
            } else if ((isTeamMode || !passCount) && finishedRunners.length >= runners.length) {
                gameEndScheduled=true; raceEnded=true; stopBGM(); gameRunning=false; showResultScreen();
            }
        }

        function showFinalGap() {
            const sr = [...runners].sort((a,b)=>a.finished&&b.finished ? a.finishTime-b.finishTime : (a.finished?-1:b.finished?1:b.position-a.position));
            if(!sr[passCount]) { gameRunning=false; showResultScreen(); return; }
            gapMode=true; gapRunnerA=sr[passCount-1]; gapRunnerB=sr[passCount];
            const d = Math.abs(gapRunnerA.position - gapRunnerB.position);
            const gA = document.getElementById('gapAlert'); gA.querySelector('div').innerHTML = `<span style="font-size:1.5rem;font-weight:bold;color:${d<3?'#fbbf24':'#9ca3af'}">${d<3?'아깝다!':'아깝지는 않다!'}</span><span style="width:24px;"></span><span style="font-size:2.5rem;font-weight:bold;color:#fff">${d.toFixed(2)}m 차이</span>`;
            gA.classList.remove('hidden');
            setTimeout(()=> { gameRunning=false; gA.classList.add('hidden'); showResultScreen(); }, 4000);
        }

        // ==========================================
        // 5. Result Screen (CF1 Logic)
        // ==========================================
        function showResultScreen() {
            document.getElementById('gameScreen').classList.add('hidden');
            document.getElementById('exitBtn').classList.add('hidden'); // 결과창에선 숨김
            document.getElementById('resultScreen').classList.remove('hidden');
            document.getElementById('globalVolumeControl').classList.add('hidden');

            const list = document.getElementById('cfResultList');
            list.innerHTML = '';
            
            const sorted = [...runners].sort((a,b) => a.finishTime - b.finishTime);
            
            // 이전 합격/탈락자 데이터 초기화 (이번 판의 결과로 덮어쓰기 위함)
            lastRacePassedIds.clear();
            lastRaceFailedIds.clear();
            
            let teamAssignments = [];
            if (isTeamMode) {
                let total = sorted.length; let sizes = new Array(teamCount).fill(Math.floor(total/teamCount));
                for(let i=0; i<total%teamCount; i++) sizes[i]++;
                let left=0; let right=total-1; let placeLeft=true;
                for(let t=0; t<teamCount; t++) {
                    while(sizes[t]>0) { if(placeLeft) teamAssignments[left++]=t; else teamAssignments[right--]=t; placeLeft=!placeLeft; sizes[t]--; }
                }
            }

            sorted.forEach((r, i) => {
                r.finalRank = i+1;
                if(isTeamMode) { 
                    r.assignedTeam = teamNames[teamAssignments[i]]; 
                    r.assignedTeamColor = teamColors[teamAssignments[i]]; 
                    r.teamIndex = teamAssignments[i]; 
                } else { 
                    r.isQualified = r.finalRank <= passCount; 
                    if (r.isQualified) {
                        lastRacePassedIds.add(r.member.id);
                        // 기타모드이면서 서바이벌일 때 합격자를 자동으로 팀 대기열로 넘겨줌
                        if (currentRosterMode === 'other') {
                            const matchedMem = membersOther.find(mx => mx.id === r.member.id);
                            if (matchedMem) matchedMem.pool = 'team';
                        }
                    } else {
                        lastRaceFailedIds.add(r.member.id);
                    }
                }
            });

            let displaySorted = [...sorted];
            if(isTeamMode) displaySorted.sort((a,b) => a.teamIndex - b.teamIndex || a.finalRank - b.finalRank);

            let cols = isTeamMode ? teamCount : 2;
            let gridClass = "grid-cols-1 md:grid-cols-2";
            if(cols===3) gridClass="grid-cols-1 md:grid-cols-2 lg:grid-cols-3"; if(cols===4) gridClass="grid-cols-1 md:grid-cols-2 xl:grid-cols-4";
            list.className = `grid ${gridClass} gap-8`;

            for(let c=0; c<cols; c++) {
                const colDiv = document.createElement('div'); colDiv.className="flex flex-col gap-3";
                const hDiv = document.createElement('div'); hDiv.className="flex px-3 py-2 bg-[rgba(255,255,255,0.05)] ea-font text-gray-400 text-sm border-b border-[rgba(255,255,255,0.1)] mb-1";
                hDiv.innerHTML = `<div class="w-12 text-center">순위</div><div class="flex-1 ml-4">드라이버</div>${!isTeamMode||teamCount<3?'<div class="w-20 text-center">기록</div>':''}<div class="w-24 text-right">상태</div>`;
                colDiv.appendChild(hDiv);

                let tm = isTeamMode ? displaySorted.filter(r=>r.teamIndex===c) : displaySorted.slice(c*Math.ceil(displaySorted.length/2), (c+1)*Math.ceil(displaySorted.length/2));
                tm.forEach(r => {
                    let sH = '', iC = '', bLC = '';
                    if(isTeamMode) {
                        sH = `<div class="w-24 text-center text-xl ea-font-black px-2 py-1 rounded" style="background-color:${r.assignedTeamColor}; color:#000;">${r.assignedTeam}</div>`;
                        iC = 'border-l-4 bg-[rgba(255,255,255,0.08)]'; bLC = r.assignedTeamColor;
                    } else {
                        if(r.isQualified) { sH = `<div class="w-24 text-right text-xl ea-font-black text-[#acfef8]">합격</div>`; iC = 'border-l-4 border-l-[var(--theme-mint)] bg-[rgba(172,254,248,0.1)]'; }
                        else { sH = `<div class="w-24 text-right text-xl ea-font-black text-red-500">탈락</div>`; iC = 'opacity-50 grayscale'; }
                    }
                    const item = document.createElement('div'); item.className=`flex items-center gap-4 p-3 bg-[rgba(255,255,255,0.03)] border border-[rgba(255,255,255,0.05)] ${iC}`;
                    if(bLC) item.style.borderLeftColor = bLC;
                    item.innerHTML = `
                        <div class="w-12 text-center text-2xl ea-font-black text-white">${r.finalRank}</div>
                        <div class="w-12 h-12 bg-gray-800 border-2 overflow-hidden relative" style="border-color:${r.member.color}; border-radius:50% !important;">
                            <img src="${r.member.imgPng||r.member.img}" crossorigin="anonymous" class="w-full h-full object-cover">
                        </div>
                        <div class="flex-1 min-w-0 flex flex-col justify-center">
                            <div class="text-xl ea-font-black truncate ${(!isTeamMode && !r.isQualified) ? 'text-gray-400':'text-white'}">${r.member.name}</div>
                            ${!isTeamMode||teamCount<3 ? `<div class="text-sm ea-font text-gray-400">${r.finishTime.toFixed(2)}s</div>`:''}
                        </div>
                        ${sH}
                    `;
                    colDiv.appendChild(item);
                });
                list.appendChild(colDiv);
            }
        }

        function captureResultsText() {
            const span = document.querySelector('#captureBtn span'); span.textContent = '복사 중...';
            const sr = [...runners].sort((a,b)=>isTeamMode ? (a.teamIndex-b.teamIndex || a.finalRank-b.finalRank) : a.finalRank-b.finalRank);
            
            // 동일한 스네이크 팀 배정 로직 반영
            let teamAssignments = [];
            if (isTeamMode) {
                let total = sr.length;
                let sizes = new Array(teamCount).fill(Math.floor(total / teamCount));
                for (let i = 0; i < total % teamCount; i++) sizes[i]++;
                let left = 0; let right = total - 1; let placeLeft = true;
                for (let t = 0; t < teamCount; t++) {
                    while (sizes[t] > 0) {
                        if (placeLeft) teamAssignments[left++] = t;
                        else teamAssignments[right--] = t;
                        placeLeft = !placeLeft;
                        sizes[t]--;
                    }
                }
            }
            
            sr.forEach((r, i) => {
                if (isTeamMode) {
                    let teamIndex = teamAssignments[i];
                    r.assignedTeam = teamNames[teamIndex];
                }
            });

            let txt = isTeamMode && teamCount>2 ? "순위\t드라이버\t팀\n" : "순위\t드라이버\t기록\t상태\n";
            sr.forEach(r => {
                if(isTeamMode && teamCount>2) txt+=`${r.finalRank}\t${r.member.name}\t${r.assignedTeam}\n`;
                else txt+=`${r.finalRank}\t${r.member.name}\t${r.finishTime.toFixed(2)}s\t${isTeamMode?r.assignedTeam:(r.isQualified?'합격':'탈락')}\n`;
            });
            const ta = document.createElement("textarea"); ta.value = txt; document.body.appendChild(ta); ta.select();
            try { document.execCommand('copy'); span.textContent = '텍스트 복사 완료!'; } catch(e) { span.textContent = '복사 실패'; }
            document.body.removeChild(ta); setTimeout(()=>span.textContent='결과 텍스트 복사', 2500);
        }

        function returnToMenu() {
            document.getElementById('resultScreen').classList.add('hidden');
            document.getElementById('menuScreen').classList.remove('hidden');
            
            // 상태 초기화
            passCount = null;
            selectedMembers.clear();
            
            if (currentRosterMode === 'other') createMemberGrid();
            updateSelectionUI();

            // 이전 합격/탈락자 데이터 버튼 가시성 업데이트
            if (currentRosterMode === 'chunta') {
                if(!isTeamMode && (lastRacePassedIds.size > 0 || lastRaceFailedIds.size > 0)) {
                    document.getElementById('selectPassedBtn').classList.remove('hidden');
                    document.getElementById('selectFailedBtn').classList.remove('hidden');
                } else if (isTeamMode) {
                    document.getElementById('selectPassedBtn').classList.add('hidden');
                    document.getElementById('selectFailedBtn').classList.add('hidden');
                }
            }
        }

        // 페이지 로드 시 바로 메뉴 초기화 실행
        window.addEventListener('DOMContentLoaded', () => {
            initMenuUI();
        });

    </script>
</body>
