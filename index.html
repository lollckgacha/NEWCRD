<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>천타버스 랜덤 달리기 & 그랑프리</title>
    <link rel="icon" href="https://raw.githubusercontent.com/Cren0p/CRD/refs/heads/main/CRD.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:ital,wght@0,400;0,700;0,900;1,900&family=Rajdhani:wght@600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/dom-to-image/2.6.0/dom-to-image.min.js"></script>
    
    <style>
        /* Base EA & CF1 Styles */
        :root {
            --theme-mint: #acfef8;
            --ea-dark: #0a0a0f;
            --ea-panel: rgba(20, 20, 25, 0.85);
            --ea-border: rgba(255, 255, 255, 0.15);
        }
        body { font-family: 'Noto Sans KR', 'Segoe UI', sans-serif; background-color: var(--ea-dark); color: white; margin: 0; padding: 0; overflow-x: hidden; }
        .ea-font { font-family: 'Rajdhani', 'Noto Sans KR', sans-serif; font-style: italic; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em; }
        .ea-font-black { font-family: 'Noto Sans KR', sans-serif; font-style: italic; font-weight: 900; text-transform: uppercase; letter-spacing: 0.05em; }
        
        * { border-radius: 0 !important; outline: none !important; }
        
        /* 숨김 처리를 강제하기 위한 유틸리티 */
        .hidden { display: none !important; }

        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: rgba(0,0,0,0.8); }
        ::-webkit-scrollbar-thumb { background: var(--theme-mint); }

        .menu-bg {
            position: absolute; inset: 0; z-index: -1;
            background: radial-gradient(circle at 70% 30%, rgba(172, 254, 248, 0.15) 0%, var(--ea-dark) 60%);
        }
        .menu-bg::after {
            content: ''; position: absolute; inset: 0;
            background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(255,255,255,0.03) 2px, rgba(255,255,255,0.03) 4px);
            pointer-events: none;
        }

        .ea-panel {
            background: linear-gradient(135deg, rgba(30, 30, 35, 0.95) 0%, rgba(15, 15, 20, 0.95) 100%);
            border: 1px solid var(--ea-border);
            backdrop-filter: blur(10px); box-shadow: 0 20px 40px rgba(0,0,0,0.5); position: relative;
        }

        .ea-btn {
            background: rgba(255, 255, 255, 0.05); color: white; border: 1px solid var(--ea-border);
            transform: skewX(-15deg); transition: all 0.2s cubic-bezier(0.25, 0.8, 0.25, 1);
            position: relative; overflow: hidden; cursor: pointer;
        }
        .ea-btn > span { display: block; transform: skewX(15deg); }
        .ea-btn:hover:not(:disabled) {
            background: white; color: black; border-color: white;
            box-shadow: 0 0 20px rgba(255,255,255,0.3); transform: skewX(-15deg) scale(1.02);
        }
        .ea-btn:disabled { background: rgba(255, 255, 255, 0.02); color: rgba(255,255,255,0.3); cursor: not-allowed; }
        .ea-btn-primary { background: var(--theme-mint); border-color: var(--theme-mint); color: var(--ea-dark); }
        .ea-btn-primary:hover:not(:disabled) { background: #8de5dd; border-color: #8de5dd; color: var(--ea-dark); box-shadow: 0 0 30px rgba(172, 254, 248, 0.5); }

        /* Driver Cards (CF1 style) */
        .driver-card {
            background: #111; border: 1px solid var(--ea-border); position: relative; overflow: hidden; cursor: grab;
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1); aspect-ratio: 3/4; user-select: none;
        }
        .driver-card:active { cursor: grabbing; }
        .driver-card img { width: 100%; height: 100%; object-fit: cover; object-position: top; transition: transform 0.5s ease, filter 0.3s ease; filter: grayscale(100%) brightness(0.6); pointer-events: none; }
        .driver-card .card-overlay { position: absolute; inset: 0; background: linear-gradient(0deg, rgba(0,0,0,0.9) 0%, rgba(0,0,0,0.2) 50%, transparent 100%); z-index: 10; pointer-events: none; }
        .driver-card .card-info { position: absolute; bottom: 0; left: 0; width: 100%; padding: 12px; z-index: 20; transform: translateY(5px); transition: transform 0.3s ease; pointer-events: none; }
        .driver-card:hover:not(.selected) img { transform: scale(1.05); filter: grayscale(50%) brightness(0.8); }
        .driver-card:hover:not(.selected) .card-info { transform: translateY(0); }
        .driver-card.selected { border-color: var(--theme-mint); box-shadow: 0 0 20px rgba(172, 254, 248, 0.3); transform: translateY(-5px); }
        .driver-card.selected img { filter: grayscale(0%) brightness(1.1); transform: scale(1.05); }
        .driver-card.selected .card-info { transform: translateY(0); }
        .driver-card.selected::after { content: ''; position: absolute; top: 0; right: 0; width: 30px; height: 30px; background: linear-gradient(225deg, var(--theme-mint) 50%, transparent 50%); z-index: 30; }

        .num-grid { display: grid; grid-template-columns: repeat(6, 1fr); gap: 6px; }
        .num-btn { background: rgba(255,255,255,0.05); border: 1px solid var(--ea-border); color: white; height: 36px; display: flex; align-items: center; justify-content: center; font-size: 1.1rem; cursor: pointer; transition: all 0.2s; }
        .num-btn:hover:not(:disabled) { background: rgba(255,255,255,0.2); }
        .num-btn.selected { background: var(--theme-mint); border-color: var(--theme-mint); color: var(--ea-dark); font-weight: 900; box-shadow: 0 0 15px rgba(172, 254, 248, 0.4); }
        .num-btn:disabled { opacity: 0.2; cursor: not-allowed; }

        /* CRD Game Canvas Styles */
        #gameCanvas { width: 100%; height: 100%; display: block; }
        .ranking-item { transition: all 0.3s ease; }
        .ranking-item-confirmed {
            animation: confirmPulse 1s ease infinite, confirmGlow 0.5s ease-out;
            background: linear-gradient(135deg, rgba(34, 197, 94,0.3) 0%, rgba(34, 197, 94,0.1) 100%);
            border: 2px solid #22c55e; transform: scale(1.12);
        }
        @keyframes confirmPulse { 0%, 100% { transform: scale(1.12); } 50% { transform: scale(1.18); } }
        @keyframes confirmGlow {
            0% { box-shadow: 0 0 0 rgba(34,197,94,0); }
            50% { box-shadow: 0 0 30px rgba(34,197,94,0.8), 0 0 60px rgba(34,197,94,0.4); }
            100% { box-shadow: 0 0 20px rgba(34,197,94,0.6), 0 0 40px rgba(34,197,94,0.3); }
        }

        #eventAlert div, #ultimateAlert div, #countdownAlert div {
            background: rgba(0, 0, 0, 0.85); padding: 20px 32px; backdrop-filter: blur(8px);
            box-shadow: 0 4px 20px rgba(0,0,0,0.5); display: flex; align-items: center; justify-content: center; min-height: 60px;
        }
        #ultimateAlert div { text-shadow: none !important; width: 100%; box-shadow: 0 -4px 20px rgba(0,0,0,0.5); }
        #gapAlert div {
            background: rgba(0, 0, 0, 0.85); padding: 20px 32px; backdrop-filter: blur(8px);
            display: flex; align-items: center; justify-content: center; min-height: 60px;
            width: 100%; box-shadow: 0 -4px 20px rgba(0,0,0,0.5);
        }
        #eventAlert { background: transparent; }
        #eventAlert div { background: rgba(0, 0, 0, 0.85); padding: 12px 24px; min-height: 48px; font-size: 1.5rem; }
        .ranking-container {
            position: absolute; top: 50%; left: 16px; transform: translateY(-50%) scale(1.3); transform-origin: left center; z-index: 50;
        }
        #ultimateAlert { bottom: 0; top: auto; left: 0; right: 0; width: 100%; }
        #countdownAlert { top: 8%; }
        #eventAlert { top: 8%; left: 50%; transform: translate(-50%, 0); }
        #gapAlert { bottom: 0; top: auto; left: 0; right: 0; width: 100%; }
        
        .countdown-text { animation: countdownPulse 0.5s ease-out; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; font-weight: 800; font-size: 4rem;}
        @keyframes countdownPulse { 0% { transform: scale(0.5); opacity: 0; } 50% { transform: scale(1.2); opacity: 1; } 100% { transform: scale(1); opacity: 1; } }
        
        .sprint-effect { animation: sprintGlow 0.3s ease-in-out infinite alternate; }
        @keyframes sprintGlow {
            0% { text-shadow: 0 0 10px currentColor, 0 0 20px currentColor; }
            100% { text-shadow: 0 0 20px currentColor, 0 0 40px currentColor, 0 0 60px currentColor; }
        }

        .sprint-speed-lines { position: absolute; width: 100%; height: 100%; pointer-events: none; z-index: 4; overflow: hidden; }
        .sprint-speed-lines::before, .sprint-speed-lines::after {
            content: ''; position: absolute; width: 200%; height: 200%; top: -50%; left: -50%;
            background: repeating-linear-gradient(90deg, transparent, transparent 40px, rgba(255,255,255,0.15) 40px, rgba(255,255,255,0.15) 42px);
            animation: sprintLines 0.015s linear infinite;
        }
        .sprint-speed-lines::after {
            background: repeating-linear-gradient(85deg, transparent, transparent 60px, rgba(255,255,255,0.08) 60px, rgba(255,255,255,0.08) 63px);
            animation-duration: 0.02s;
        }
        @keyframes sprintLines { from { transform: translateX(0); } to { transform: translateX(-42px); } }
        
        .sprint-wind-effect { position: absolute; width: 100%; height: 100%; pointer-events: none; z-index: 6; overflow: hidden; }
        .wind-line { position: absolute; height: 2px; background: linear-gradient(90deg, transparent, rgba(255,255,255,0.6), transparent); animation: windMove 0.3s linear infinite; }
        @keyframes windMove { 0% { transform: translateX(100vw); } 100% { transform: translateX(-100vw); } }

        .sprint-split-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 50; overflow: hidden; }
        .split-left, .split-right { position: absolute; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.7); transition: transform 0.5s ease; }
        .split-left { clip-path: polygon(0 0, 100% 0, 50% 100%, 0% 100%); transform: translateX(-100%); }
        .split-right { clip-path: polygon(50% 0, 100% 0, 100% 100%, 0% 100%); transform: translateX(100%); }
        .sprint-split-overlay.active .split-left { animation: splitLeft 1.5s ease forwards; }
        .sprint-split-overlay.active .split-right { animation: splitRight 1.5s ease forwards; }
        @keyframes splitLeft { 0% { transform: translateX(-100%); } 30% { transform: translateX(0); } 70% { transform: translateX(0); } 100% { transform: translateX(-100%); } }
        @keyframes splitRight { 0% { transform: translateX(100%); } 30% { transform: translateX(0); } 70% { transform: translateX(0); } 100% { transform: translateX(100%); } }
        
        .sprint-character-display {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 51; pointer-events: none; opacity: 0; text-align: center;
            display: flex; flex-direction: column; align-items: center; justify-content: center; width: 100vw;
        }
        .sprint-character-display.active { animation: characterShow 1.5s ease forwards; }
        @keyframes characterShow {
            0% { opacity: 0; transform: translate(-50%, -50%) scale(0.5); }
            20% { opacity: 1; transform: translate(-50%, -50%) scale(1.1); }
            30% { opacity: 1; transform: translate(-50%, -50%) scale(1); }
            70% { opacity: 1; transform: translate(-50%, -50%) scale(1); }
            100% { opacity: 0; transform: translate(-50%, -50%) scale(0.8); }
        }
        .sprint-character-image { max-width: 300px; max-height: 400px; margin-bottom: 20px; object-fit: contain; }
        .sprint-character-text { font-size: 3rem; font-weight: bold; color: #fbbf24; font-family: 'Segoe UI', sans-serif; text-align: center; width: 100%; }

        .midboss-split-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 60; overflow: hidden; }
        .midboss-split-left, .midboss-split-right { position: absolute; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.7); }
        .midboss-split-left { clip-path: polygon(0 0, 100% 0, 50% 100%, 0% 100%); transform: translateX(-100%); }
        .midboss-split-right { clip-path: polygon(50% 0, 100% 0, 100% 100%, 0% 100%); transform: translateX(100%); }
        .midboss-split-overlay.active .midboss-split-left { animation: midbossSplitLeft 2s ease forwards; }
        .midboss-split-overlay.active .midboss-split-right { animation: midbossSplitRight 2s ease forwards; }
        @keyframes midbossSplitLeft { 0% { transform: translateX(-100%); } 20% { transform: translateX(0); } 80% { transform: translateX(0); } 100% { transform: translateX(-100%); } }
        @keyframes midbossSplitRight { 0% { transform: translateX(100%); } 20% { transform: translateX(0); } 80% { transform: translateX(0); } 100% { transform: translateX(100%); } }
        
        .midboss-character-display {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 61; pointer-events: none; opacity: 0; text-align: center;
            display: flex; flex-direction: column; align-items: center; justify-content: center; width: 100vw;
        }
        .midboss-character-display.active { animation: midbossCharacterShow 2s ease forwards; }
        @keyframes midbossCharacterShow {
            0% { opacity: 0; transform: translate(-50%, -50%) scale(0.5); }
            15% { opacity: 1; transform: translate(-50%, -50%) scale(1.1); }
            25% { opacity: 1; transform: translate(-50%, -50%) scale(1); }
            75% { opacity: 1; transform: translate(-50%, -50%) scale(1); }
            100% { opacity: 0; transform: translate(-50%, -50%) scale(0.8); }
        }
        .midboss-character-image { max-width: 350px; max-height: 450px; margin-bottom: 20px; object-fit: contain; }
        .midboss-character-text { font-size: 3.5rem; font-weight: bold; font-family: 'Segoe UI', sans-serif; text-align: center; width: 100%; }
        
        #midbossAlert { position: absolute; bottom: 0; left: 0; right: 0; width: 100%; z-index: 62; }
        #midbossAlert div {
            background: rgba(0, 0, 0, 0.9); padding: 20px 32px; backdrop-filter: blur(8px);
            display: flex; align-items: center; justify-content: center; min-height: 70px;
            width: 100%; box-shadow: 0 -4px 20px rgba(0,0,0,0.5);
        }
        .midboss-subtitle { font-size: 2rem; font-weight: bold; color: #fbbf24; font-family: 'Segoe UI', sans-serif;}

        .lightning-flash {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 55;
            background: rgba(255, 255, 0, 0.3); animation: lightningFlash 0.1s ease-out;
        }
        @keyframes lightningFlash { 0% { opacity: 1; } 100% { opacity: 0; } }

        /* Loading / Volume */
        .loading-overlay {
            position: fixed; inset: 0; background: var(--ea-dark); align-items: center; justify-content: center; z-index: 9999;
        }
        .loading-overlay:not(.hidden) { display: flex !important; }
        
        .loading-spinner { width: 60px; height: 60px; border: 4px solid rgba(255,255,255,0.05); border-top-color: var(--theme-mint); animation: spin 1s linear infinite; border-radius: 50% !important; }
        @keyframes spin { to { transform: rotate(360deg); } }

        #globalVolumeControl {
            position: fixed; top: 16px; right: 16px; z-index: 9000; align-items: center; gap: 8px;
            background: rgba(10, 10, 15, 0.8); backdrop-filter: blur(8px); padding: 8px 14px; pointer-events: auto;
            border: 1px solid var(--ea-border);
        }
        #globalVolumeControl:not(.hidden) { display: flex !important; }
        
        #globalVolumeControl button {
            background: none; border: none; color: white; font-size: 1.4rem; cursor: pointer; padding: 2px;
            display: flex; align-items: center; justify-content: center; width: 32px; height: 32px; transition: background 0.2s;
        }
        #globalVolumeControl button:hover { background: rgba(255,255,255,0.15); }
        #volumeSlider { -webkit-appearance: none; appearance: none; width: 100px; height: 6px; background: rgba(255,255,255,0.25); outline: none; cursor: pointer; }
        #volumeSlider::-webkit-slider-thumb { -webkit-appearance: none; appearance: none; width: 16px; height: 16px; background: var(--theme-mint); cursor: pointer; border-radius: 50% !important; }

        /* Result Screen */
        #resultScreen { position: absolute; top: 0; left: 0; width: 100%; min-height: 100vh; background: rgba(10,10,15,0.98); z-index: 50; overflow-y: auto; padding: 3rem 1rem; }
    </style>
</head>
<body>

    <!-- Global Volume Control & Exit (Only shown during the game) -->
    <div id="globalVolumeControl" class="hidden">
        <button id="muteBtn" onclick="toggleMute()" title="음소거">🔊</button>
        <input type="range" id="volumeSlider" min="0" max="100" value="25" oninput="changeVolume(this.value)">
        <button id="exitBtn" onclick="forceExitGame()" class="text-red-500 font-bold ml-2 border-l border-[rgba(255,255,255,0.2)] pl-3" title="나가기">✖</button>
    </div>

    <!-- Loading -->
    <div id="loadingOverlay" class="loading-overlay hidden">
        <div class="text-center">
            <div class="loading-spinner mx-auto mb-8"></div>
            <p class="text-white text-3xl ea-font tracking-widest text-gray-400">리소스 로딩 중 <span id="loadingProgress" class="text-white ml-2">0/15</span></p>
        </div>
    </div>

    <!-- 2. Menu Screen (CF1 Style UI applied to CRD) -->
    <div id="menuScreen" class="min-h-screen flex flex-col relative">
        <div class="menu-bg"></div>
        <header class="w-full pt-8 pb-4 px-12 flex justify-between items-center border-b border-[rgba(255,255,255,0.1)]">
            <div class="flex items-center gap-6">
                <img src="https://raw.githubusercontent.com/Cren0p/CRD/refs/heads/main/CRD.webp" alt="CRD Logo" class="h-16 object-contain">
                <h1 class="text-4xl text-white ea-font-black m-0 leading-none">천타버스 <span class="text-[#acfef8]">랜덤 달리기</span></h1>
            </div>
            
            <!-- 변경점: hidden lg:flex 를 flex로 변경하여 항상 우측 상단 탭이 보이도록 수정 -->
            <div class="flex gap-4 md:gap-8 text-gray-400 ea-font text-base md:text-xl">
                <span id="navChunta" class="text-[#acfef8] border-b-2 border-[#acfef8] pb-1 cursor-pointer transition-colors" onclick="switchRoster('chunta')">천타버스</span>
                <span id="navOther" class="hover:text-white cursor-pointer transition-colors" onclick="switchRoster('other')">기타 컨텐츠</span>
                <span class="hover:text-white cursor-pointer transition-colors" onclick="location.href='https://lollckgacha.github.io/chuntaR1/'">처음으로 돌아가기</span>
            </div>
        </header>

        <div class="flex-1 w-full max-w-[1600px] mx-auto p-8 flex flex-col lg:flex-row gap-8 z-10 relative">
            <div class="w-full lg:w-1/3 flex flex-col gap-6">
                <div class="ea-panel p-6">
                    
                    <!-- Tabs for Session Mode -->
                    <div class="flex mb-6 border-b border-[rgba(255,255,255,0.1)]">
                        <button id="tabSurvival" class="flex-1 py-4 ea-font-black text-2xl text-[#acfef8] bg-gradient-to-r from-[rgba(172,254,248,0.2)] to-transparent text-center transition-all duration-300" onclick="setMode('survival')">멤버 뽑기</button>
                        <button id="tabTeam" class="flex-1 py-4 ea-font-black text-2xl text-gray-500 hover:text-white text-center transition-all duration-300" onclick="setMode('team')">팀 나누기</button>
                    </div>
                    
                    <!-- Survival Setting -->
                    <div id="survivalSettingSection" class="mb-6">
                        <div class="flex justify-between items-center mb-3">
                            <span class="ea-font text-lg text-white">합격 인원 설정</span>
                            <span id="qualifyText" class="ea-font-black text-xl text-[#acfef8]">-</span>
                        </div>
                        <div id="passCountWrapper" class="num-grid"></div>
                    </div>

                    <!-- Team Mode Setting -->
                    <div id="teamSettingSection" class="mb-6 hidden">
                        <div class="flex justify-between items-center mb-1">
                            <span class="ea-font text-lg text-white">팀 수 설정</span>
                            <span id="teamCountText" class="ea-font-black text-xl text-[#acfef8]">-</span>
                        </div>
                        <div class="text-[#acfef8] text-sm mb-3 ea-font font-bold">※ 결과창에서 스네이크 방식으로 배정됩니다.</div>
                        <div class="flex gap-2">
                            <button class="ea-btn flex-1 py-2 team-btn" data-teams="2"><span>2팀</span></button>
                            <button class="ea-btn flex-1 py-2 team-btn" data-teams="3"><span>3팀</span></button>
                            <button class="ea-btn flex-1 py-2 team-btn" data-teams="4"><span>4팀</span></button>
                        </div>
                    </div>

                    <!-- CRD Options -->
                    <div class="mb-6">
                        <div class="flex justify-between items-center mb-3">
                            <span class="ea-font text-lg text-white">막판 스퍼트 (역전)</span>
                        </div>
                        <div class="flex gap-2">
                            <button id="sprintToggleBtnOn" class="ea-btn flex-1 py-2 ea-btn-primary" onclick="toggleSprintSetting(true)"><span>켜기</span></button>
                            <button id="sprintToggleBtnOff" class="ea-btn flex-1 py-2" onclick="toggleSprintSetting(false)"><span>끄기</span></button>
                        </div>
                    </div>

                    <!-- Participant Selection -->
                    <div class="mb-8 pt-4 border-t border-[rgba(255,255,255,0.1)]">
                        <div class="flex justify-between items-center mb-3">
                            <span class="ea-font text-lg text-white">참가자 일괄 선택</span>
                        </div>
                        <!-- Chuntaverse Buttons -->
                        <div class="flex gap-2" id="selectionButtonsChunta">
                            <button id="selectAllBtn" class="ea-btn flex-1 py-3 ea-font text-sm"><span>전체 선택</span></button>
                            <button id="selectPassedBtn" class="ea-btn flex-1 py-3 ea-font text-sm hidden" style="color:#22c55e;"><span>이전 합격자</span></button>
                            <button id="selectFailedBtn" class="ea-btn flex-1 py-3 ea-font text-sm hidden" style="color:#ef4444;"><span>이전 탈락자</span></button>
                        </div>
                        <!-- Other Content Buttons -->
                        <div class="flex gap-2 hidden" id="selectionButtonsOther">
                            <button id="selectAllOtherBtn" class="ea-btn flex-1 py-3 ea-font text-sm"><span>전체 선택</span></button>
                            <button id="selectSurvivalPoolBtn" class="ea-btn flex-1 py-3 ea-font text-sm"><span>멤버뽑기 선택</span></button>
                            <button id="selectTeamPoolBtn" class="ea-btn flex-1 py-3 ea-font text-sm"><span>팀나누기 선택</span></button>
                        </div>
                    </div>

                    <div class="pt-6 border-t border-[rgba(255,255,255,0.1)]">
                        <div class="flex justify-between text-sm text-gray-400 mb-2 ea-font">

                <div>
                    <div class="text-[#acfef8] ea-font text-xl mb-1">공식 기록 (OFFICIAL RESULT)</div>

                </div>
                <img src="https://raw.githubusercontent.com/Cren0p/CRD/refs/heads/main/CRD_A.webp" crossorigin="anonymous" class="h-10 object-contain hidden sm:block">
            </div>
            <div id="captureTarget" class="w-full flex-1 overflow-y-auto custom-scrollbar p-6 lg:p-10">

    <!-- Exit Confirm Modal -->
    <div id="exitModal" class="hidden fixed inset-0 bg-black/80 flex items-center justify-center z-[9999] backdrop-blur-sm">

            <h2 class="text-3xl ea-font-black text-white">달리기 종료</h2>
            <p class="text-gray-300 text-lg">정말로 달리기를 종료하고<br>메뉴로 돌아가시겠습니까?</p>
            <div class="flex gap-4 mt-2">
                <button onclick="closeExitModal()" class="ea-btn flex-1 py-3 bg-[rgba(255,255,255,0.1)] border-[rgba(255,255,255,0.2)]"><span>취소</span></button>
                <button onclick="executeExitGame()" class="ea-btn flex-1 py-3 bg-red-600/80 border-red-500 text-white hover:bg-red-500"><span>종료하기</span></button>
            </div>
        </div>
    </div>

    <script>
        // ==========================================
        // 1. Database & State Variables
        // ==========================================
        const baseUrl = 'https://raw.githubusercontent.com/Cren0p/CRD/refs/heads/main/';
        
        const membersChuntaverse = [
            { id: 1, name: '천양', img: baseUrl + '01.webp', imgJpg: baseUrl + '01.webp', imgPng: baseUrl + '01.webp', color: '#43EAF6', isBoss: true },
            { id: 2, name: '마다옴', img: baseUrl + '02.webp', imgJpg: baseUrl + '02.webp', imgPng: baseUrl + '02.webp', color: '#FFF5C3' },
            { id: 3, name: '나나문', img: baseUrl + '03.webp', imgJpg: baseUrl + '03.webp', imgPng: baseUrl + '03.webp', color: '#F4F6FF' },
            { id: 4, name: '임하밍', img: baseUrl + '04.webp', imgJpg: baseUrl + '04.webp', imgPng: baseUrl + '04.webp', color: '#F8DBFF' },
            { id: 5, name: '문모모', img: baseUrl + '05.webp', imgJpg: baseUrl + '05.webp', imgPng: baseUrl + '05.webp', color: '#A868FB' },
            { id: 6, name: '한아밍', img: baseUrl + '06.webp', imgJpg: baseUrl + '06.webp', imgPng: baseUrl + '06.webp', color: '#FEC0C2' },
            { id: 7, name: '카푸', img: baseUrl + '07.webp', imgJpg: baseUrl + '07.webp', imgPng: baseUrl + '07.webp', color: '#FFCFB7' },
            { id: 8, name: '캬앙', img: baseUrl + '08.webp', imgJpg: baseUrl + '08.webp', imgPng: baseUrl + '08.webp', color: '#FF5A4D' },
            { id: 9, name: '김웰로', img: baseUrl + '09.webp', imgJpg: baseUrl + '09.webp', imgPng: baseUrl + '09.webp', color: '#BFEF90' },
            { id: 10, name: '모카', img: baseUrl + '10.webp', imgJpg: baseUrl + '10.webp', imgPng: baseUrl + '10.webp', color: '#5E8EFF' },
            { id: 11, name: '달타', img: baseUrl + '11.webp', imgJpg: baseUrl + '11.webp', imgPng: baseUrl + '11.webp', color: '#FFC462' },
            { id: 12, name: '파니', img: baseUrl + '12.webp', imgJpg: baseUrl + '12.webp', imgPng: baseUrl + '12.webp', color: '#9FC5E8' }
        ];

        const ALL_OTHER_MEMBERS = [
            { id: 101, name: '난워니', img: 'guest/nanwony.png', imgJpg: 'guest/nanwony.png', imgPng: 'guest/nanwony.png', color: '#ffff00' },
            { id: 102, name: '뢴트게늄', img: 'guest/roen.webp', imgJpg: 'guest/roen.webp', imgPng: 'guest/roen.webp', color: '#e5446e' },
            { id: 103, name: '카나시', img: 'guest/kanasi.png', imgJpg: 'guest/kanasi.png', imgPng: 'guest/kanasi.png', color: '#ffd4c2' },
            { id: 104, name: '최또', img: 'guest/choiddo.png', imgJpg: 'guest/choiddo.png', imgPng: 'guest/choiddo.png', color: '#f1c1c3' },
            { id: 105, name: '나리', img: 'guest/nari.png', imgJpg: 'guest/nari.png', imgPng: 'guest/nari.png', color: '#1c1c1c' },
            { id: 106, name: '돗챠', img: 'guest/dotcha.png', imgJpg: 'guest/dotcha.png', imgPng: 'guest/dotcha.png', color: '#f788be' }
        ];

        const midBosses = [
            { id: 'authority', name: '수장의 권한', img: baseUrl + 'CY.webp', color: '#43EAF6' },
            { id: 'buo', name: '부어', img: baseUrl + 'TANG.webp', color: '#FFA500' },
            { id: 'thunder', name: '천기의자', img: baseUrl + 'TH.webp', color: '#FFFF00' }
        ];

        let membersOther = [];
        const ACTIVE_SURVIVAL = [];
        const ACTIVE_TEAM = [];

        ACTIVE_SURVIVAL.forEach(input => {
            let found = ALL_OTHER_MEMBERS.find(m => m.id === input || m.name === input) || membersChuntaverse.find(m => m.id === input || m.name === input);
            if (found) membersOther.push({ ...found, pool: 'survival' });
        });
        ACTIVE_TEAM.forEach(input => {
            let found = ALL_OTHER_MEMBERS.find(m => m.id === input || m.name === input) || membersChuntaverse.find(m => m.id === input || m.name === input);
            if (found) membersOther.push({ ...found, pool: 'team' });
        });

        function sortMembers(arr) {
            arr.sort((a, b) => {
                if (a.id === 1) return -1;
                if (b.id === 1) return 1;
                return a.name.localeCompare(b.name);
            });
        }
        sortMembers(membersChuntaverse);
        sortMembers(membersOther);

        // Global States
        let currentRosterMode = 'chunta';
        let members = membersChuntaverse;
        let selectedMembers = new Set();
        
        let passCount = null;
        let isTeamMode = false;
        let teamCount = null;
        const teamColors = ['#ef4444', '#3b82f6', '#22c55e', '#facc15']; 
        const teamNames = ['A팀', 'B팀', 'C팀', 'D팀'];

        let lastRacePassedIds = new Set();
        let lastRaceFailedIds = new Set();
        let allImagesLoaded = false;
        const preloadedTextures = {};
        const preloadedBossTextures = {};

        // Audio System
        let bgm = null;
        let isMuted = false;
        let currentVolume = 0.25;

        // CRD Game Engine Vars
        let scene, camera, renderer;
        let runners = [];
        let obstacles = [];
        let trackLength = 500;
        let finishLine;
        let gameRunning = false;
        let raceEnded = false;
        let gameTime = 0;
        let slowMotion = false;
        let slowMotionFactor = 1;
        let currentCameraMode = 'overview';
        let prevCameraMode = 'overview';
        let cameraChangeTimer = 0;
        let finishedRunners = [];
        
        let sprintEnabled = true;
        let ultimateUsed = false;
        let ultimateActive = false;
        let confirmedRanks = new Set();
        let startingSequence = false;
        let raceStarted = false;
        let sprintPhaseStarted = false;
        let sprintRunners = [];
        let previousRanks = {};
        let gapMode = false;
        let gapRunnerA = null;
        let gapRunnerB = null;
        let gameEndScheduled = false;
        let isPaused = false;
        let sharedGeometries = {};
        let sharedMaterials = {};
        let lastTime = 0;

        let midBossTriggered = false;
        let midBossActive = false;
        let currentMidBoss = null;
        let midBossMesh = null;

        // ==========================================
        // 2. Init & Menu UI Logic
        // ==========================================

        function forceExitGame() {
            isPaused = true;
            document.getElementById('exitModal').classList.remove('hidden');
        }

        function closeExitModal() {
            document.getElementById('exitModal').classList.add('hidden');
            if (raceStarted && !raceEnded && !midBossActive && !sprintPhaseStarted) isPaused = false;
        }

        function executeExitGame() {
            document.getElementById('exitModal').classList.add('hidden');
            gameRunning = false;
            isPaused = false;
            stopBGM();
            document.getElementById('gameScreen').classList.add('hidden');
            document.getElementById('menuScreen').classList.remove('hidden');
            document.getElementById('globalVolumeControl').classList.add('hidden'); // 패널 전체 숨김
            document.getElementById('rankingContainer').style.opacity = '0';
            document.getElementById('sprintSplitOverlay').classList.remove('active');
            document.getElementById('sprintCharacterDisplay').classList.remove('active');
            document.getElementById('midbossSplitOverlay').classList.remove('active');
            document.getElementById('midbossCharacterDisplay').classList.remove('active');
            document.getElementById('ultimateAlert').classList.add('hidden');
            document.getElementById('eventAlert').classList.add('hidden');
            document.getElementById('gapAlert').classList.add('hidden');
            document.getElementById('countdownAlert').classList.add('hidden');
            
            if (scene) {
                scene.traverse(o => {
                    if (o.geometry) o.geometry.dispose();
                    if (o.material) { if (Array.isArray(o.material)) o.material.forEach(m => m.dispose()); else o.material.dispose(); }
                });
            }
            if (renderer) renderer.clear();
        }

        function initMenuUI() {
            renderPassButtons();
            setupTeamButtons();
            preloadImages();

            // Chuntaverse Events
            document.getElementById('selectAllBtn').onclick = () => {
                if (selectedMembers.size === members.length) selectedMembers.clear();
                else members.forEach(m => selectedMembers.add(m.id));
                updateSelectionUI();
            };
            document.getElementById('selectPassedBtn').onclick = () => applyPrev(lastRacePassedIds);
            document.getElementById('selectFailedBtn').onclick = () => applyPrev(lastRaceFailedIds);
            
            // Other Content Events
            document.getElementById('selectAllOtherBtn').onclick = () => {
                if (selectedMembers.size === members.length) selectedMembers.clear();
                else members.forEach(m => selectedMembers.add(m.id));
                updateSelectionUI();
            };
            document.getElementById('selectSurvivalPoolBtn').onclick = () => {
                const targetIds = members.filter(m => m.pool === 'survival').map(m => m.id);
                const allSelected = targetIds.every(id => selectedMembers.has(id)) && targetIds.length > 0;
                targetIds.forEach(id => allSelected ? selectedMembers.delete(id) : selectedMembers.add(id));
                updateSelectionUI();
            };
            document.getElementById('selectTeamPoolBtn').onclick = () => {
                const targetIds = members.filter(m => m.pool === 'team').map(m => m.id);
                const allSelected = targetIds.every(id => selectedMembers.has(id)) && targetIds.length > 0;
                targetIds.forEach(id => allSelected ? selectedMembers.delete(id) : selectedMembers.add(id));
                updateSelectionUI();
            };

            document.getElementById('startBtn').onclick = startCRDGame;
            document.getElementById('captureBtn').onclick = captureResultsText;
            document.getElementById('replayBtn').onclick = returnToMenu;
        }

        // ==========================================
        // 3. Menu UI Logic
        // ==========================================
        function switchRoster(mode) {
            if (currentRosterMode === mode) return;
            currentRosterMode = mode;
            
            const navChunta = document.getElementById('navChunta');
            const navOther = document.getElementById('navOther');
            
            if (mode === 'chunta') {
                navChunta.className = "text-[#acfef8] border-b-2 border-[#acfef8] pb-1 cursor-pointer transition-colors";
                navOther.className = "hover:text-white cursor-pointer transition-colors text-gray-400";
                members = membersChuntaverse;
                document.getElementById('selectionButtonsChunta').classList.remove('hidden');
                document.getElementById('selectionButtonsOther').classList.add('hidden');
            } else {
                navOther.className = "text-[#acfef8] border-b-2 border-[#acfef8] pb-1 cursor-pointer transition-colors";
                navChunta.className = "hover:text-white cursor-pointer transition-colors text-gray-400";
                members = membersOther;
                document.getElementById('selectionButtonsChunta').classList.add('hidden');
                document.getElementById('selectionButtonsOther').classList.remove('hidden');
            }
            
            selectedMembers.clear();
            passCount = null;
            lastRacePassedIds.clear();
            lastRaceFailedIds.clear();
            
            updatePassedFailedButtons();
            preloadImages(); 
        }

        function setMode(mode) {
            isTeamMode = (mode === 'team');
            const tabSurv = document.getElementById('tabSurvival');
            const tabTeam = document.getElementById('tabTeam');
            const secSurv = document.getElementById('survivalSettingSection');
            const secTeam = document.getElementById('teamSettingSection');

            const survActive = ['text-[#acfef8]', 'bg-gradient-to-r', 'from-[rgba(172,254,248,0.2)]', 'to-transparent'];
            const teamActive = ['text-[#acfef8]', 'bg-gradient-to-l', 'from-[rgba(172,254,248,0.2)]', 'to-transparent'];
            const inactiveClass = ['text-gray-500', 'hover:text-white'];

            if (!isTeamMode) {
                tabSurv.classList.add(...survActive); tabSurv.classList.remove(...inactiveClass);
                tabTeam.classList.add(...inactiveClass); tabTeam.classList.remove(...teamActive);
                secSurv.classList.remove('hidden'); secTeam.classList.add('hidden');
            } else {
                tabTeam.classList.add(...teamActive); tabTeam.classList.remove(...inactiveClass);
                tabSurv.classList.add(...inactiveClass); tabSurv.classList.remove(...survActive);
                secTeam.classList.remove('hidden'); secSurv.classList.add('hidden');
            }
            updatePassedFailedButtons();
            updateStartBtnState();
        }

        function updatePassedFailedButtons() {
            if (currentRosterMode === 'chunta') {
                if (!isTeamMode && (lastRacePassedIds.size > 0 || lastRaceFailedIds.size > 0)) {
                    document.getElementById('selectPassedBtn').classList.remove('hidden');
                    document.getElementById('selectFailedBtn').classList.remove('hidden');
                } else {
                    document.getElementById('selectPassedBtn').classList.add('hidden');
                    document.getElementById('selectFailedBtn').classList.add('hidden');
                }
            }
        }

        function toggleSprintSetting(isOn) {
            sprintEnabled = isOn;
            const btnOn = document.getElementById('sprintToggleBtnOn');
            const btnOff = document.getElementById('sprintToggleBtnOff');
            if (isOn) {
                btnOn.classList.add('ea-btn-primary'); btnOff.classList.remove('ea-btn-primary');
            } else {
                btnOff.classList.add('ea-btn-primary'); btnOn.classList.remove('ea-btn-primary');
            }
        }

        function preloadImages() {
            const overlay = document.getElementById('loadingOverlay');
            const prog = document.getElementById('loadingProgress');
            overlay.classList.remove('hidden');
            
            let loadedCount = 0;
            const toLoadMem = members.filter(m => !preloadedTextures[m.id]);
            const toLoadBoss = midBosses.filter(b => !preloadedBossTextures[b.id]);
            const totalToLoad = toLoadMem.length + toLoadBoss.length;
            
            if (totalToLoad === 0) {
                allImagesLoaded = true;
                overlay.classList.add('hidden');
                createMemberGrid(); updateSelectionUI(); return;
            }

            const loader = new THREE.TextureLoader();
            loader.setCrossOrigin('anonymous');
            
            const onLoad = () => {
                loadedCount++;
                prog.textContent = `${loadedCount}/${totalToLoad}`;
                if (loadedCount === totalToLoad) {
                    allImagesLoaded = true; overlay.classList.add('hidden');
                    createMemberGrid(); updateSelectionUI();
                }
            };

            toLoadMem.forEach(m => {
                loader.load(m.img, tex => {
                    tex.generateMipmaps = true;
                    tex.minFilter = THREE.LinearMipmapLinearFilter;
                    tex.magFilter = THREE.LinearFilter;
                    preloadedTextures[m.id] = tex; onLoad();
                }, undefined, () => onLoad()); // ignore error
            });
            toLoadBoss.forEach(b => {
                loader.load(b.img, tex => {
                    tex.generateMipmaps = true;
                    tex.minFilter = THREE.LinearMipmapLinearFilter;
                    tex.magFilter = THREE.LinearFilter;
                    preloadedBossTextures[b.id] = tex; onLoad();
                }, undefined, () => onLoad());
            });
        }

        // Drag and Drop (CF1)
        window.allowDrop = (e) => { e.preventDefault(); e.currentTarget.classList.add('border-[var(--theme-mint)]', 'bg-[rgba(172,254,248,0.05)]'); };
        window.dragLeave = (e) => { e.currentTarget.classList.remove('border-[var(--theme-mint)]', 'bg-[rgba(172,254,248,0.05)]'); };
        window.dropToPool = (e, pool) => {
            e.preventDefault(); e.currentTarget.classList.remove('border-[var(--theme-mint)]', 'bg-[rgba(172,254,248,0.05)]');
            const id = e.dataTransfer.getData('text/plain'); if(!id) return;
            const member = members.find(m => m.id.toString() === id);
            if (member && member.pool !== pool) { member.pool = pool; createMemberGrid(); updateSelectionUI(); }
        };

        function createCard(m) {
            const card = document.createElement('div');
            card.className = 'driver-card cursor-grab active:cursor-grabbing';
            card.dataset.id = m.id;
            card.draggable = true;
            card.ondragstart = (e) => { e.dataTransfer.setData('text/plain', m.id); e.target.style.opacity = '0.5'; };
            card.ondragend = (e) => { e.target.style.opacity = '1'; };
            
            const imgUrl = m.imgPng || m.img || 'logo2.png';
            card.innerHTML = `
                <div class="absolute inset-0" style="background: radial-gradient(circle at center 30%, ${m.color}80 0%, #111 70%); z-index: 1;"></div>
                <img src="${imgUrl}" crossorigin="anonymous" alt="${m.name}" style="position: relative; z-index: 5; pointer-events: none;" onerror="this.onerror=null; this.src='logo2.png';">
                <div class="card-overlay" style="z-index: 10;"></div>
                <div class="card-info" style="z-index: 20;">
                    <div class="w-6 h-1 mb-1" style="background-color: ${m.color}"></div>
                    <div class="ea-font-black text-xl leading-none text-white tracking-wide truncate">${m.name}</div>
                </div>
            `;
            card.onclick = () => {
                if (selectedMembers.has(m.id)) selectedMembers.delete(m.id);
                else selectedMembers.add(m.id);
                updateSelectionUI();
            };
            return card;
        }

        function createMemberGrid() {
            const grid = document.getElementById('memberGrid');
            grid.innerHTML = '';
            
            if (currentRosterMode === 'chunta') {
                grid.className = "grid grid-cols-3 sm:grid-cols-4 lg:grid-cols-4 xl:grid-cols-6 gap-4";
                members.forEach(m => grid.appendChild(createCard(m)));
            } else {
                grid.className = "flex flex-col gap-6 w-full";
                const survivalPool = members.filter(m => m.pool === 'survival');
                const teamPool = members.filter(m => m.pool === 'team');
                
                const survDiv = document.createElement('div');

        // CF1 스타일의 광고 텍스처를 생성하는 함수
        function createAdTexture(callback) {
            const canvas = document.createElement('canvas');
            const h = 512; 
            const ctx = canvas.getContext('2d');
            const adUrls = [
                'https://stimg.sooplive.com/NORMAL_BBS/3/12240993/400469ea5c8310b52.png',
                'https://stimg.sooplive.com/NORMAL_BBS/3/12240993/210869fc32ffe7b23.png',
                'https://stimg.sooplive.com/NORMAL_BBS/3/12240993/57946a008d9623d75.png'
            ];
            
            const images = [];
            let loaded = 0;
            
            adUrls.forEach((url, i) => {
                const img = new Image();
                img.crossOrigin = 'anonymous';
                img.onload = () => { images[i] = img; loaded++; if(loaded === adUrls.length) draw(); };
                img.onerror = () => { images[i] = null; loaded++; if(loaded === adUrls.length) draw(); };
                img.src = url;
            });
            
            function draw() {
                const validImages = images.filter(img => img !== null);
                if (validImages.length > 0) {
                    const img = validImages[0];
                    const w = (img.width / img.height) * h;
                    
                    // 4개의 패널을 이어붙인 텍스처를 만듭니다.
                    canvas.width = w * 4;
                    canvas.height = h;
                    
                    // 1. 원본 이미지
                    ctx.drawImage(img, 0, 0, w, h);
                    
                    // 2. CF1 스타일 텍스트 광고판
                    ctx.fillStyle = '#111'; ctx.fillRect(w, 0, w, h);
                    ctx.fillStyle = '#acfef8'; ctx.font = "italic 900 95px 'Rajdhani', sans-serif"; ctx.textAlign='center'; ctx.textBaseline='middle';
                    ctx.fillText('CHUNTAVERSE', w + w/2, h/2);
                    
                    // 3. 원본 이미지
                    ctx.drawImage(img, w*2, 0, w, h);
                    
                    // 4. CF1 스타일 텍스트 광고판 2
                    ctx.fillStyle = '#111'; ctx.fillRect(w*3, 0, w, h);
                    ctx.fillStyle = '#00d2ff'; ctx.font = "italic 900 95px 'Rajdhani', sans-serif"; ctx.textAlign='center'; ctx.textBaseline='middle';
                    ctx.fillText('CHUNTAVERSE', w*3 + w/2, h/2);
                } else {
                    canvas.width = 1024; canvas.height = 512;
                    ctx.fillStyle = '#0a0a0f'; ctx.fillRect(0,0,1024,512);
                    ctx.fillStyle = '#acfef8'; ctx.font = "italic 900 95px 'Rajdhani', sans-serif"; ctx.textAlign='center'; ctx.textBaseline='middle';
                    ctx.fillText("CHUNTAVERSE", 512, 256);
                }
                
                const texture = new THREE.CanvasTexture(canvas);
                texture.generateMipmaps = true;
                texture.minFilter = THREE.LinearMipmapLinearFilter;
                callback(texture);
            }
        }

        // 트랙 전체 길이에 맞게 광고판(벽) 생성
        function createBillboards() {
            createAdTexture((texture) => {
                const laneCount = selectedMembers.size;
                const trackWidth = laneCount * 6;
                const totalTrackLength = trackLength + 200; // 시작점부터 결승선 너머까지
                
                const wallHeight = 5;
                const wallGeom = new THREE.PlaneGeometry(totalTrackLength, wallHeight);
                
                texture.wrapS = THREE.RepeatWrapping;
                texture.wrapT = THREE.RepeatWrapping;
                
                // 벽 길이에 맞게 텍스처 반복 설정
                const aspect = texture.image.width / texture.image.height;
                const repeatX = totalTrackLength / (wallHeight * aspect);
                texture.repeat.set(repeatX, 1);
                
                const wallMat = new THREE.MeshBasicMaterial({ map: texture, side: THREE.FrontSide });
                
                // 왼쪽 광고 벽
                const leftWall = new THREE.Mesh(wallGeom, wallMat);
                leftWall.position.set(-trackWidth / 2 - 4, wallHeight / 2, totalTrackLength / 2 - 100);
                leftWall.rotation.y = Math.PI / 2;
                scene.add(leftWall);

                // 오른쪽 광고 벽
                const rightWall = new THREE.Mesh(wallGeom, wallMat);
                rightWall.position.set(trackWidth / 2 + 4, wallHeight / 2, totalTrackLength / 2 - 100);
                rightWall.rotation.y = -Math.PI / 2;
                scene.add(rightWall);
            });
        }

        function createObstacles() {

            for (let lane = 0; lane < laneCount; lane++) {

                const positions = [];
                for (let i = 0; i < 15; i++) {
                    let attempts = 0, valid = false, pos;
                    while (!valid && attempts < 100) {
                        pos = 10 + Math.random() * (trackLength - 20); valid = true;
                        for (let ex of positions) if (Math.abs(pos - ex) < 25) { valid = false; break; }
                        attempts++;

                    } else if (type === 'gravel') {

                        for (let j = 0; j < 40; j++) {

                            const s = new THREE.Mesh(sharedGeometries.stone, sharedMaterials.gravelColors[Math.floor(Math.random()*4)]);
                            s.scale.setScalar(size); s.position.set((Math.random()-0.5)*4.2, size/2, (Math.random()-0.5)*4.2);
                            s.rotation.set(Math.random()*Math.PI*2, Math.random()*Math.PI*2, Math.random()*Math.PI*2); s.castShadow=true; grp.add(s);
                        }

                    } else {
                        const grp = new THREE.Group();
                        const a = new THREE.Mesh(sharedGeometries.boostArrow, sharedMaterials.boostArrow); a.rotation.set(-Math.PI/2,0,Math.PI); a.position.y=0.05; grp.add(a);
                        const b = new THREE.Mesh(sharedGeometries.boostBase, sharedMaterials.boostBase); b.rotation.x=-Math.PI/2; b.position.y=0.03; grp.add(b);

        function runStartingSequence() {
            const laneCount = selectedMembers.size; const trackWidth = laneCount * 6; const startX = -trackWidth / 2 + 3;
            camera.position.set(startX - 6, 6, 8); camera.lookAtVector = new THREE.Vector3(startX, 2, 0); camera.lookAt(camera.lookAtVector);
            renderer.render(scene, camera);
            setTimeout(() => {
                const endX = startX + (laneCount - 1) * 6;
                const animStart = performance.now();
                function anim1() {
                    const prog = Math.min((performance.now() - animStart) / 5500, 1);
                    const ease = prog < 0.5 ? 2*prog*prog : 1-Math.pow(-2*prog+2,2)/2;
                    camera.position.lerpVectors(new THREE.Vector3(startX-6,6,8), new THREE.Vector3(endX-6,6,8), ease);
                    camera.lookAtVector.lerpVectors(new THREE.Vector3(startX,2,0), new THREE.Vector3(endX,2,0), ease); camera.lookAt(camera.lookAtVector);
                    renderer.render(scene, camera);
                    if(prog < 1) requestAnimationFrame(anim1); else setTimeout(anim2, 500);
                }
                function anim2() {
                    const stPos = camera.position.clone(); const stLook = camera.lookAtVector.clone();
                    const aStart = performance.now();
                    function a2() {
                        const prog = Math.min((performance.now() - aStart) / 3500, 1);
                        const ease = prog < 0.5 ? 2*prog*prog : 1-Math.pow(-2*prog+2,2)/2;
                        camera.position.lerpVectors(stPos, new THREE.Vector3(0,18,-40), ease);
                        camera.lookAtVector.lerpVectors(stLook, new THREE.Vector3(0,2,0), ease); camera.lookAt(camera.lookAtVector);
                        renderer.render(scene, camera);
                        if(prog < 1) requestAnimationFrame(a2); else startCountdown();
                    }
                    a2();
                }
                anim1();
            }, 500);
        }

        // MidBoss Events (crd)
        function checkMidBossEvent() {
            if (midBossTriggered || !raceStarted || raceEnded) return;
            if (bgm && bgm.currentTime >= 27 && bgm.currentTime < 28) { midBossTriggered = true; triggerMidBossEvent(); }
        }

        function triggerMidBossEvent() {
            isPaused = true; midBossActive = true;
            if (currentCameraMode === 'side') {
                currentCameraMode = 'overview'; prevCameraMode = 'overview';
                const l = runners.reduce((a, b) => a.position > b.position ? a : b);
                camera.position.set(25, 40, l.position - 25); 
                camera.lookAtVector.set(5, 0, l.position);
                camera.lookAt(camera.lookAtVector);
            }
            currentMidBoss = midBosses[Math.floor(Math.random() * 3)];
            
            const bGrp = new THREE.Group(); const c = new THREE.Color(currentMidBoss.color);
            
            const side = new THREE.MeshStandardMaterial({color:c}); const top = new THREE.MeshStandardMaterial({color:c}); const bot = new THREE.MeshStandardMaterial({color:0x222});
            const torso = new THREE.Mesh(new THREE.BoxGeometry(2.2,2.2,1.4), [side,side,top,bot,side,side]);
            torso.position.y=1.8; torso.castShadow=true; bGrp.add(torso);

            bGrp.position.set(0, 15, trackLength - 20); bGrp.scale.setScalar(2); scene.add(bGrp); midBossMesh = bGrp;
